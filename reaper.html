<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Reaper · Tracking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ─── RESET & FULLSCREEN ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
        }

        /* ─── FULLSCREEN MAP ─── */
        #map-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }
        #map {
            width: 100%;
            height: 100%;
        }

        /* ─── FLOATING UI WRAPPER ─── */
        .floating-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            /* allow clicks to pass through to map except on UI elements */
        }
        .floating-ui>* {
            pointer-events: auto;
        }

        /* ─── HEADER (top center) ─── */
        .ui-header {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            padding: 10px 28px 12px;
            border-radius: 16px;
            border: 1px solid rgba(0, 229, 255, 0.15);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            min-width: 200px;
            white-space: nowrap;
        }
        .ui-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.2rem, 2.2vw, 1.8rem);
            background: linear-gradient(90deg, #00e5ff, #0077ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.04em;
            line-height: 1.2;
        }
        .ui-header .sub {
            font-size: clamp(0.6rem, 1vw, 0.8rem);
            color: #aaa;
            margin-top: -2px;
            -webkit-text-fill-color: #aaa;
            letter-spacing: 0.15em;
        }
        .ui-header .sub strong {
            color: #00e5ff;
            -webkit-text-fill-color: #00e5ff;
            font-weight: 700;
        }

        /* ─── STATUS (top right) ─── */
        .ui-status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: clamp(0.6rem, 0.9vw, 0.75rem);
            font-weight: 600;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.3s;
            max-width: 280px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ui-status.registered {
            border-color: rgba(0, 229, 255, 0.3);
            color: #00e5ff;
        }
        .ui-status.other {
            border-color: rgba(255, 200, 0, 0.3);
            color: #ffcc00;
        }
        .ui-status.unregistered {
            border-color: rgba(255, 100, 100, 0.3);
            color: #ff6666;
        }

        /* ─── DEVICE DETAILS (bottom left) ─── */
        .ui-details {
            position: absolute;
            bottom: 24px;
            left: 24px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 16px;
            padding: 14px 18px 16px;
            border: 1px solid rgba(0, 229, 255, 0.08);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            max-width: 340px;
            width: calc(100% - 48px);
            max-height: 45vh;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .ui-details .title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.6rem, 1vw, 0.75rem);
            color: #00e5ff;
            letter-spacing: 0.1em;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ui-details .title span {
            font-size: 0.7rem;
            opacity: 0.5;
        }
        .device-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 10px;
            max-height: 32vh;
            overflow-y: auto;
            padding-right: 4px;
        }
        .device-grid::-webkit-scrollbar {
            width: 3px;
        }
        .device-grid::-webkit-scrollbar-thumb {
            background: #00e5ff;
            border-radius: 6px;
        }
        .device-grid::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }
        .device-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.6rem;
            border-left: 1px solid rgba(0, 229, 255, 0.1);
        }
        .device-card .c-label {
            color: #00e5ff;
            font-weight: 600;
            display: block;
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        .device-card .c-value {
            color: #ddd;
            word-break: break-word;
            font-size: 0.6rem;
        }
        .no-device-msg {
            color: #666;
            font-size: 0.7rem;
            text-align: center;
            padding: 12px 0;
        }

        /* ─── ACTION BUTTONS (bottom center) ─── */
        .ui-actions {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid rgba(0, 229, 255, 0.08);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            max-width: 92%;
        }
        .ui-actions .btn {
            padding: 8px 18px;
            background: transparent;
            border: 1px solid rgba(0, 229, 255, 0.25);
            color: #00e5ff;
            font-weight: 700;
            font-size: clamp(0.6rem, 0.9vw, 0.75rem);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
            background: rgba(0, 229, 255, 0.03);
        }
        .ui-actions .btn:hover {
            background: rgba(0, 229, 255, 0.15);
            border-color: #00e5ff;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.08);
        }
        .ui-actions .btn.danger {
            border-color: rgba(255, 70, 70, 0.25);
            color: #ff5555;
        }
        .ui-actions .btn.danger:hover {
            background: rgba(255, 70, 70, 0.12);
            border-color: #ff5555;
            box-shadow: 0 0 30px rgba(255, 70, 70, 0.08);
        }
        .ui-actions .btn.hidden {
            display: none !important;
        }

        /* ─── TRACK BUTTON (special glow) ─── */
        .ui-actions .btn-track {
            border-color: rgba(0, 229, 255, 0.5);
            background: rgba(0, 229, 255, 0.08);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.05);
        }
        .ui-actions .btn-track:hover {
            background: rgba(0, 229, 255, 0.2);
            border-color: #00e5ff;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.15);
        }

        /* ─── MODAL (floating on top) ─── */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }
        .modal-box {
            background: rgba(8, 8, 8, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 229, 255, 0.15);
            padding: clamp(20px, 3vw, 32px);
            max-width: 94%;
            width: 520px;
            border-radius: 20px;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-box .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            text-align: center;
            color: #00e5ff;
            margin-bottom: 4px;
        }
        .step-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 10px 0 16px;
        }
        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #333;
            transition: all 0.3s;
        }
        .step-dot.active {
            background: #00e5ff;
            transform: scale(1.3);
            box-shadow: 0 0 16px rgba(0, 229, 255, 0.3);
        }
        .wizard-step .field {
            margin-bottom: 10px;
        }
        .wizard-step .field label {
            display: block;
            color: #888;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        .wizard-step .field input {
            width: 100%;
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.04);
            border: none;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            color: #fff;
            font-size: 0.85rem;
            outline: none;
            border-radius: 0;
            transition: border-color 0.3s;
        }
        .wizard-step .field input:focus {
            border-bottom-color: #00e5ff;
            background: rgba(255, 255, 255, 0.04);
        }
        .wizard-nav {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 14px;
        }
        .wizard-nav button {
            padding: 8px 18px;
            background: transparent;
            border: 1px solid rgba(0, 229, 255, 0.2);
            color: #00e5ff;
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.25s;
            flex: 1;
        }
        .wizard-nav button:hover {
            background: rgba(0, 229, 255, 0.08);
            border-color: #00e5ff;
        }
        .wizard-nav button.primary {
            background: #00e5ff;
            color: #000;
            border-color: #00e5ff;
        }
        .wizard-nav button.primary:hover {
            background: #66f0ff;
        }
        .wizard-nav button.hidden {
            display: none !important;
        }

        .phone-frame-mini {
            width: 140px;
            height: 240px;
            margin: 0 auto 10px;
            border-radius: 24px;
            border: 4px solid #1a1a1a;
            background: #0a0a0a;
            padding: 10px 6px;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.03);
        }
        .phone-frame-mini .notch {
            width: 60px;
            height: 14px;
            background: #000;
            border-radius: 0 0 8px 8px;
            margin: -10px auto 4px;
        }
        .phone-frame-mini .screen {
            background: #111;
            border-radius: 12px;
            padding: 8px 10px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .phone-frame-mini .screen input {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-bottom: 1px solid #00e5ff;
            color: #fff;
            padding: 6px 2px;
            font-size: 0.8rem;
            outline: none;
            width: 100%;
            text-align: center;
        }
        .phone-frame-mini .screen input::placeholder {
            color: #444;
        }

        .hidden {
            display: none !important;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 640px) {
            .ui-header {
                top: 12px;
                padding: 6px 16px 8px;
                min-width: unset;
                white-space: normal;
            }
            .ui-status {
                top: 12px;
                right: 12px;
                padding: 4px 12px;
                font-size: 0.55rem;
                max-width: 160px;
                white-space: nowrap;
            }
            .ui-details {
                bottom: 80px;
                left: 12px;
                right: 12px;
                width: auto;
                max-width: unset;
                padding: 10px 12px 12px;
                max-height: 30vh;
            }
            .device-grid {
                grid-template-columns: 1fr 1fr;
                gap: 3px 6px;
                max-height: 20vh;
            }
            .ui-actions {
                bottom: 12px;
                padding: 6px 12px;
                gap: 6px;
                border-radius: 30px;
                width: calc(100% - 24px);
            }
            .ui-actions .btn {
                padding: 5px 12px;
                font-size: 0.55rem;
                letter-spacing: 0.5px;
            }
            .modal-box {
                padding: 16px;
            }
            .phone-frame-mini {
                width: 100px;
                height: 170px;
                padding: 6px 4px;
            }
            .phone-frame-mini .notch {
                width: 40px;
                height: 10px;
                margin: -6px auto 2px;
            }
            .phone-frame-mini .screen input {
                font-size: 0.6rem;
                padding: 4px 2px;
            }
        }
        @media (max-width: 400px) {
            .ui-header h1 {
                font-size: 0.9rem;
            }
            .ui-status {
                font-size: 0.45rem;
                padding: 2px 8px;
                max-width: 120px;
            }
            .device-grid {
                grid-template-columns: 1fr;
            }
            .ui-actions .btn {
                font-size: 0.45rem;
                padding: 4px 8px;
            }
        }

        /* ─── Leaflet routing custom ─── */
        .leaflet-routing-container {
            display: none !important;
        }
        .leaflet-routing-alt {
            display: none !important;
        }
        .leaflet-routing-geocoder {
            display: none !important;
        }
        .leaflet-routing-error {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- ─── FULLSCREEN MAP ─── -->
    <div id="map-container">
        <div id="map"></div>
    </div>

    <!-- ─── FLOATING UI ─── -->
    <div class="floating-ui">

        <!-- Header -->
        <div class="ui-header">
            <h1>THE REAPER</h1>
            <div class="sub">Hi <strong id="user-name-display">User</strong> · tracking active</div>
        </div>

        <!-- Status -->
        <div class="ui-status unregistered" id="device-status">
            <span id="status-text">⏳ Loading...</span>
        </div>

        <!-- Device details (bottom left) -->
        <div class="ui-details" id="ui-details">
            <div class="title">⚡ <span>DEVICE DETAILS</span></div>
            <div id="device-details-grid" class="device-grid"></div>
            <div id="no-device-message" class="no-device-msg">No registered device. Set one up.</div>
        </div>

        <!-- Action buttons (bottom center) -->
        <div class="ui-actions">
            <button class="btn" id="setup-device-btn">SETUP</button>
            <button class="btn btn-track hidden" id="track-device-btn">📍 TRACK</button>
            <button class="btn danger hidden" id="delete-device-btn">DELETE</button>
            <button class="btn" id="logout-btn">LOGOUT</button>
        </div>

    </div>

    <!-- ─── MODAL ─── -->
    <div id="wizard-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-title">🔧 DEVICE SETUP</div>
            <div class="step-dots">
                <span class="step-dot active" id="dot-1"></span>
                <span class="step-dot" id="dot-2"></span>
                <span class="step-dot" id="dot-3"></span>
            </div>

            <div id="wizard-step-1" class="wizard-step">
                <div style="text-align:center;color:#888;font-size:0.7rem;margin-bottom:6px;">Step 1 · Device Identity</div>
                <div class="phone-frame-mini">
                    <div class="notch"></div>
                    <div class="screen">
                        <label style="color:#aaa;font-size:0.5rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;display:block;">MEI / IMEI</label>
                        <input type="text" id="mei-input" placeholder="Enter unique ID" />
                    </div>
                </div>
                <p style="color:#555;text-align:center;font-size:0.65rem;">This identifies your device uniquely.</p>
            </div>

            <div id="wizard-step-2" class="wizard-step hidden">
                <div style="text-align:center;color:#888;font-size:0.7rem;margin-bottom:6px;">Step 2 · Contact & Address</div>
                <div class="field">
                    <label>Full Name</label>
                    <input type="text" id="wiz-name" placeholder="John Doe" />
                </div>
                <div class="field">
                    <label>Address</label>
                    <input type="text" id="wiz-address" placeholder="123 Cyber St, Tech City" />
                </div>
                <div class="field">
                    <label>City / Region</label>
                    <input type="text" id="wiz-city" placeholder="Metropolis" />
                </div>
            </div>

            <div id="wizard-step-3" class="wizard-step hidden">
                <div style="text-align:center;color:#888;font-size:0.7rem;margin-bottom:6px;">Step 3 · Extra Security</div>
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="wiz-email" placeholder="your@email.com" />
                </div>
                <div class="field">
                    <label>Phone Number</label>
                    <input type="tel" id="wiz-phone" placeholder="+1 555 000 000" />
                </div>
                <div class="field">
                    <label>Alternative Contact</label>
                    <input type="text" id="wiz-alt" placeholder="Emergency contact" />
                </div>
            </div>

            <div class="wizard-nav">
                <button id="wizard-prev">← BACK</button>
                <button id="wizard-next" class="primary">NEXT →</button>
                <button id="wizard-finish" class="primary hidden">FINISH</button>
            </div>
        </div>
    </div>

    <!-- ─── SCRIPTS ─── -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js"
            }
        }
    </script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js">
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, set, get, remove, update } from "firebase/database";
        import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyDye0P37QYNjtRRKh2_At84QCkKCqjceAQ",
            authDomain: "reaper-7b33d.firebaseapp.com",
            databaseURL: "https://reaper-7b33d-default-rtdb.firebaseio.com",
            projectId: "reaper-7b33d",
            storageBucket: "reaper-7b33d.firebasestorage.app",
            messagingSenderId: "1023523985110",
            appId: "1:1023523985110:web:889e2200fad1fa5b98db77",
            measurementId: "G-NQ8F9TKPVZ"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);

        let currentUser = null;
        let currentUid = null;
        let registeredDeviceId = null;
        let deviceDataRef = null;
        let map = null;
        let phoneMarker = null;
        let currentMarker = null;
        let routingControl = null;
        let collectedDeviceData = {};
        let lastKnownLat = 0;
        let lastKnownLon = 0;
        let updateInterval = null;
        let wizardStep = 1;
        let wizardData = {};
        let isRegisteredDevice = false;
        let locationWatchId = null;

        const userNameDisplay = document.getElementById('user-name-display');
        const deviceGrid = document.getElementById('device-details-grid');
        const noDeviceMsg = document.getElementById('no-device-message');
        const setupBtn = document.getElementById('setup-device-btn');
        const deleteBtn = document.getElementById('delete-device-btn');
        const trackBtn = document.getElementById('track-device-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const wizardModal = document.getElementById('wizard-modal');
        const statusEl = document.getElementById('device-status');
        const statusText = document.getElementById('status-text');

        // ─── AUTH ───
        function showLoginRedirect() {
            alert('No authenticated user found. Please log in again.');
            window.location.href = 'index.html';
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                currentUid = user.uid;
                const name = user.displayName || user.email || 'User';
                userNameDisplay.textContent = name;
                await loadUserDevice();
                startLocationWatch();
                startPeriodicUpdates();
            } else {
                showLoginRedirect();
            }
        });

        // ─── LOGOUT ───
        logoutBtn.addEventListener('click', async () => {
            try {
                if (updateInterval) clearInterval(updateInterval);
                if (locationWatchId) navigator.geolocation.clearWatch(locationWatchId);
                await signOut(auth);
                localStorage.removeItem('reaper_device_id');
                window.location.href = 'index.html';
            } catch (err) {
                console.error('Logout error:', err);
                alert('Error signing out.');
            }
        });

        // ─── LOAD DEVICE ───
        async function loadUserDevice() {
            if (!currentUid) return;
            const userRef = ref(database, 'users/' + currentUid);
            try {
                const snap = await get(userRef);
                if (snap.exists()) {
                    const data = snap.val();
                    const devices = data.registeredDevices || {};
                    const deviceIds = Object.keys(devices);
                    if (deviceIds.length > 0) {
                        registeredDeviceId = deviceIds[0];
                        deviceDataRef = ref(database, 'users/' + currentUid + '/registeredDevices/' + registeredDeviceId);
                        await loadDeviceData();
                        setupBtn.textContent = 'UPDATE';
                        deleteBtn.classList.remove('hidden');
                    } else {
                        setUnregisteredState();
                    }
                } else {
                    setUnregisteredState();
                }
            } catch (err) {
                console.error('Error loading user device:', err);
                setUnregisteredState();
            }
        }

        function setUnregisteredState() {
            noDeviceMsg.classList.remove('hidden');
            deviceGrid.innerHTML = '';
            registeredDeviceId = null;
            deviceDataRef = null;
            setupBtn.textContent = 'SETUP';
            deleteBtn.classList.add('hidden');
            trackBtn.classList.add('hidden');
            statusEl.className = 'unregistered';
            statusText.textContent = '⚠ No device registered';
        }

        async function loadDeviceData() {
            if (!deviceDataRef) return;
            try {
                const snap = await get(deviceDataRef);
                if (snap.exists()) {
                    const data = snap.val();
                    wizardData = data;
                    renderDeviceDetails(data.deviceDetails || {});

                    const storedId = localStorage.getItem('reaper_device_id');
                    const dbId = data.mei || '';

                    if (storedId && dbId && storedId === dbId) {
                        isRegisteredDevice = true;
                        statusEl.className = 'registered';
                        statusText.textContent = '✓ This is your registered device';
                        trackBtn.classList.add('hidden');
                    } else {
                        isRegisteredDevice = false;
                        statusEl.className = 'other';
                        statusText.textContent = '⚠ Viewing phone location';
                        trackBtn.classList.remove('hidden');
                    }

                    const phoneLoc = data.phoneLocation || { lat: 0, lon: 0 };
                    updatePhoneMarker(phoneLoc.lat, phoneLoc.lon);
                    if (lastKnownLat && lastKnownLon) {
                        updateCurrentMarker(lastKnownLat, lastKnownLon);
                    }

                    noDeviceMsg.classList.add('hidden');
                    deviceGrid.classList.remove('hidden');
                } else {
                    setUnregisteredState();
                }
            } catch (err) {
                console.error('Error loading device data:', err);
                setUnregisteredState();
            }
        }

        function renderDeviceDetails(details) {
            deviceGrid.innerHTML = '';
            if (!details || Object.keys(details).length === 0) {
                deviceGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#666;font-size:0.6rem;">No details</div>';
                return;
            }
            for (const [key, value] of Object.entries(details)) {
                const card = document.createElement('div');
                card.className = 'device-card';
                card.innerHTML = `<span class="c-label">${key}</span><span class="c-value">${value || 'N/A'}</span>`;
                deviceGrid.appendChild(card);
            }
        }

        // ─── MAP ───
        function initMap(lat, lon) {
            if (map) return;
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([lat || 0, lon || 0], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: ''
            }).addTo(map);
            if (lat && lon) updatePhoneMarker(lat, lon);
        }

        function updatePhoneMarker(lat, lon) {
            if (!map) { initMap(lat, lon); return; }
            if (phoneMarker) {
                phoneMarker.setLatLng([lat, lon]);
            } else {
                const icon = L.divIcon({ html: '📱', iconSize: [28, 28], iconAnchor: [14, 28] });
                phoneMarker = L.marker([lat, lon], { icon }).addTo(map).bindPopup('<b>Registered Phone</b>');
            }
            if (currentMarker) {
                const cur = currentMarker.getLatLng();
                const bounds = L.latLngBounds([cur.lat, cur.lng], [lat, lon]);
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });
            } else {
                map.setView([lat, lon], 14, { animate: true });
            }
        }

        function updateCurrentMarker(lat, lon) {
            if (!map) { initMap(lat, lon); return; }
            if (currentMarker) {
                currentMarker.setLatLng([lat, lon]);
            } else {
                const icon = L.divIcon({ html: '📍', iconSize: [28, 28], iconAnchor: [14, 28] });
                currentMarker = L.marker([lat, lon], { icon }).addTo(map).bindPopup('<b>You are here</b>');
            }
            if (phoneMarker) {
                const phone = phoneMarker.getLatLng();
                const bounds = L.latLngBounds([lat, lon], [phone.lat, phone.lng]);
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });
            } else {
                map.setView([lat, lon], 14, { animate: true });
            }
        }

        function getPhoneLocation() {
            if (!phoneMarker) return null;
            const p = phoneMarker.getLatLng();
            return { lat: p.lat, lon: p.lng };
        }

        function getCurrentLocation() {
            if (currentMarker) {
                const p = currentMarker.getLatLng();
                return { lat: p.lat, lon: p.lng };
            }
            if (lastKnownLat && lastKnownLon) return { lat: lastKnownLat, lon: lastKnownLon };
            return null;
        }

        // ─── TRACK ───
        trackBtn.addEventListener('click', async () => {
            if (!map) { alert('Map not ready.'); return; }
            const phone = getPhoneLocation();
            const current = getCurrentLocation();
            if (!phone || !current) { alert('Missing location data.'); return; }

            if (routingControl) { map.removeControl(routingControl);
                routingControl = null; }

            const bounds = L.latLngBounds([current.lat, current.lon], [phone.lat, phone.lon]);
            map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });

            try {
                routingControl = L.Routing.control({
                    waypoints: [L.latLng(current.lat, current.lon), L.latLng(phone.lat, phone.lon)],
                    lineOptions: { styles: [{ color: '#00e5ff', weight: 3, opacity: 0.8 }] },
                    showAlternatives: false,
                    fitSelectedRoutes: false,
                    router: L.Routing.osrmv1({ serviceUrl: 'https://routing.openstreetmap.de/routed-foot/route/v1' }),
                    createMarker: () => null
                }).addTo(map);
            } catch (_) {}
        });

        // ─── LOCATION WATCH ───
        function startLocationWatch() {
            if (!navigator.geolocation) return;
            if (locationWatchId) navigator.geolocation.clearWatch(locationWatchId);
            locationWatchId = navigator.geolocation.watchPosition(
                (pos) => {
                    lastKnownLat = pos.coords.latitude;
                    lastKnownLon = pos.coords.longitude;
                    updateCurrentMarker(lastKnownLat, lastKnownLon);
                    if (isRegisteredDevice && currentUid && deviceDataRef) {
                        const locRef = ref(database, 'users/' + currentUid + '/registeredDevices/' + registeredDeviceId +
                            '/phoneLocation');
                        set(locRef, { lat: lastKnownLat, lon: lastKnownLon, timestamp: new Date().toISOString() }).catch(
                        () => {});
                    }
                    if (currentUid) {
                        const curRef = ref(database, 'users/' + currentUid + '/currentLocation');
                        set(curRef, { lat: lastKnownLat, lon: lastKnownLon, timestamp: new Date().toISOString() }).catch(
                        () => {});
                    }
                },
                () => {}, { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
            );
        }

        // ─── PERIODIC UPDATES ───
        function startPeriodicUpdates() {
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(async () => {
                if (!currentUid || !registeredDeviceId || !deviceDataRef) return;
                if (Object.keys(collectedDeviceData).length === 0) collectedDeviceData = collectDeviceInfo();
                try {
                    await update(deviceDataRef, { deviceDetails: collectedDeviceData, lastUpdated: new Date()
                            .toISOString() });
                } catch (_) {}
                try {
                    await update(ref(database, 'users/' + currentUid), { lastSeen: new Date().toISOString() });
                } catch (_) {}
            }, 10000);
        }

        function collectDeviceInfo() {
            const ua = navigator.userAgent;
            let b = 'Unknown',
                o = 'Unknown',
                t = 'Desktop';
            if (ua.indexOf('Firefox') > -1) b = 'Firefox';
            else if (ua.indexOf('Chrome') > -1 && ua.indexOf('Edg') === -1) b = 'Chrome';
            else if (ua.indexOf('Safari') > -1 && ua.indexOf('Chrome') === -1) b = 'Safari';
            else if (ua.indexOf('Edg') > -1) b = 'Edge';
            if (ua.indexOf('Windows') > -1) o = 'Windows';
            else if (ua.indexOf('Android') > -1) o = 'Android';
            else if (ua.indexOf('iPhone') > -1 || ua.indexOf('iPad') > -1) o = 'iOS';
            else if (ua.indexOf('Mac') > -1) o = 'macOS';
            else if (ua.indexOf('Linux') > -1) o = 'Linux';
            if (/Mobi|Android|iPhone|iPad|iPod/i.test(ua)) t = /Tablet/i.test(ua) ? 'Tablet' : 'Mobile';
            return {
                'Device': t,
                'OS': o,
                'Browser': b,
                'Screen': `${screen.width}×${screen.height}`,
                'CPU Cores': navigator.hardwareConcurrency || '?',
                'RAM (GB)': navigator.deviceMemory || '?'
            };
        }

        // ─── DELETE ───
        deleteBtn.addEventListener('click', async () => {
            if (!currentUid || !registeredDeviceId) { alert('No device to delete.'); return; }
            if (!confirm('Delete this device? All data will be lost.')) return;
            try {
                await remove(deviceDataRef);
                if (phoneMarker) { map.removeLayer(phoneMarker);
                    phoneMarker = null; }
                localStorage.removeItem('reaper_device_id');
                registeredDeviceId = null;
                deviceDataRef = null;
                noDeviceMsg.classList.remove('hidden');
                deviceGrid.innerHTML = '';
                setupBtn.textContent = 'SETUP';
                if (routingControl) { map.removeControl(routingControl);
                    routingControl = null; }
                trackBtn.classList.add('hidden');
                deleteBtn.classList.add('hidden');
                statusEl.className = 'unregistered';
                statusText.textContent = '⚠ Device deleted';
                alert('Device deleted.');
            } catch (err) {
                alert('Error deleting device.');
            }
        });

        // ─── WIZARD ───
        setupBtn.addEventListener('click', () => openWizard());

        function openWizard() {
            wizardModal.classList.remove('hidden');
            wizardStep = 1;
            showWizardStep(1);
            if (wizardData && wizardData.mei) {
                document.getElementById('mei-input').value = wizardData.mei || '';
                document.getElementById('wiz-name').value = wizardData.step2?.name || '';
                document.getElementById('wiz-address').value = wizardData.step2?.address || '';
                document.getElementById('wiz-city').value = wizardData.step2?.city || '';
                document.getElementById('wiz-email').value = wizardData.step3?.email || '';
                document.getElementById('wiz-phone').value = wizardData.step3?.phone || '';
                document.getElementById('wiz-alt').value = wizardData.step3?.alt || '';
            }
        }

        function showWizardStep(s) {
            document.getElementById('wizard-step-1').classList.add('hidden');
            document.getElementById('wizard-step-2').classList.add('hidden');
            document.getElementById('wizard-step-3').classList.add('hidden');
            document.getElementById('wizard-step-' + s).classList.remove('hidden');
            for (let i = 1; i <= 3; i++) {
                document.getElementById('dot-' + i).classList.toggle('active', i === s);
            }
            document.getElementById('wizard-prev').classList.toggle('hidden', s === 1);
            document.getElementById('wizard-next').classList.toggle('hidden', s === 3);
            document.getElementById('wizard-finish').classList.toggle('hidden', s !== 3);
        }

        document.getElementById('wizard-prev').addEventListener('click', () => { if (wizardStep > 1) { wizardStep--;
                showWizardStep(wizardStep); } });
        document.getElementById('wizard-next').addEventListener('click', () => { if (wizardStep < 3) { saveWizardStepData(
                    wizardStep);
                wizardStep++;
                showWizardStep(wizardStep); } });

        document.getElementById('wizard-finish').addEventListener('click', async () => {
            saveWizardStepData(3);
            const mei = document.getElementById('mei-input').value.trim();
            if (!mei) { alert('MEI Number is required.'); return; }
            const deviceData = {
                mei,
                step2: {
                    name: document.getElementById('wiz-name').value.trim(),
                    address: document.getElementById('wiz-address').value.trim(),
                    city: document.getElementById('wiz-city').value.trim()
                },
                step3: {
                    email: document.getElementById('wiz-email').value.trim(),
                    phone: document.getElementById('wiz-phone').value.trim(),
                    alt: document.getElementById('wiz-alt').value.trim()
                },
                deviceDetails: collectDeviceInfo(),
                phoneLocation: { lat: lastKnownLat || 0, lon: lastKnownLon || 0, timestamp: new Date().toISOString() },
                registeredAt: new Date().toISOString(),
                lastUpdated: new Date().toISOString()
            };
            try {
                const deviceRef = ref(database, 'users/' + currentUid + '/registeredDevices/' + mei);
                await set(deviceRef, deviceData);
                await update(ref(database, 'users/' + currentUid), { registeredDeviceId: mei });
                localStorage.setItem('reaper_device_id', mei);
                if (lastKnownLat && lastKnownLon) {
                    await set(ref(database, 'users/' + currentUid + '/currentLocation'), { lat: lastKnownLat,
                        lon: lastKnownLon, timestamp: new Date().toISOString() });
                }
                registeredDeviceId = mei;
                deviceDataRef = deviceRef;
                wizardData = deviceData;
                wizardModal.classList.add('hidden');
                await loadDeviceData();
                renderDeviceDetails(deviceData.deviceDetails);
                noDeviceMsg.classList.add('hidden');
                deviceGrid.classList.remove('hidden');
                setupBtn.textContent = 'UPDATE';
                deleteBtn.classList.remove('hidden');
                updatePhoneMarker(deviceData.phoneLocation.lat, deviceData.phoneLocation.lon);
                updateCurrentMarker(lastKnownLat, lastKnownLon);
                if (routingControl) { map.removeControl(routingControl);
                    routingControl = null; }
                isRegisteredDevice = true;
                statusEl.className = 'registered';
                statusText.textContent = '✓ This is your registered device';
                trackBtn.classList.add('hidden');
                alert('Device registered!');
            } catch (err) {
                alert('Error registering device.');
            }
        });

        function saveWizardStepData(s) {
            if (s === 1) wizardData.mei = document.getElementById('mei-input').value.trim();
            else if (s === 2) {
                if (!wizardData.step2) wizardData.step2 = {};
                wizardData.step2.name = document.getElementById('wiz-name').value.trim();
                wizardData.step2.address = document.getElementById('wiz-address').value.trim();
                wizardData.step2.city = document.getElementById('wiz-city').value.trim();
            } else if (s === 3) {
                if (!wizardData.step3) wizardData.step3 = {};
                wizardData.step3.email = document.getElementById('wiz-email').value.trim();
                wizardData.step3.phone = document.getElementById('wiz-phone').value.trim();
                wizardData.step3.alt = document.getElementById('wiz-alt').value.trim();
            }
        }

        // ─── CLOSE MODAL ───
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') wizardModal.classList.add('hidden'); });
        wizardModal.addEventListener('click', (e) => { if (e.target === e.currentTarget) wizardModal.classList.add('hidden'); });

        // ─── INIT ───
        document.addEventListener('DOMContentLoaded', () => initMap(0, 0));
        window.addEventListener('resize', () => { if (map) map.invalidateSize(); });

        console.log('🔮 The Reaper · full‑screen tracking');
    </script>
</body>
</html>
