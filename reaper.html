<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>The Reaper · Dashboard</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            background: #000000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px 40px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 229, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.04) 1px, transparent 1px);
            background-size: clamp(30px, 5vw, 50px) clamp(30px, 5vw, 50px);
            z-index: -1;
            pointer-events: none;
        }

        /* ---- HEADER ---- */
        .dashboard-header {
            width: 100%;
            max-width: 900px;
            text-align: center;
            margin-bottom: 20px;
        }
        .dashboard-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.6rem, 4vw, 2.8rem);
            background: linear-gradient(90deg, #00e5ff, #0077ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.04em;
        }
        .dashboard-header p {
            font-size: clamp(1rem, 1.6vw, 1.3rem);
            color: #aaa;
            margin-top: 2px;
        }
        .dashboard-header p strong {
            color: #00e5ff;
            font-weight: 700;
        }

        /* ---- MAP ---- */
        #map-container {
            width: 100%;
            max-width: 900px;
            height: 320px;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(0, 229, 255, 0.15);
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.05);
            margin-bottom: 18px;
            background: #111;
        }
        #map {
            width: 100%;
            height: 100%;
        }

        /* ---- DEVICE DETAILS ---- */
        .device-details-section {
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }
        .device-details-section .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1rem, 1.8vw, 1.4rem);
            color: #00e5ff;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.1);
            padding-bottom: 6px;
        }
        .device-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(160px, 45%), 1fr));
            gap: 8px;
            max-height: 260px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .device-grid::-webkit-scrollbar {
            width: 4px;
        }
        .device-grid::-webkit-scrollbar-track {
            background: #111;
            border-radius: 5px;
        }
        .device-grid::-webkit-scrollbar-thumb {
            background: #00e5ff;
            border-radius: 5px;
        }
        .device-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
        }
        .device-card .card-label {
            color: #00e5ff;
            font-weight: 600;
            display: block;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 2px;
        }
        .device-card .card-value {
            color: #ddd;
            word-break: break-word;
            font-size: 0.75rem;
        }

        /* ---- ACTION BUTTONS ---- */
        .action-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            width: 100%;
            max-width: 900px;
            margin-top: 4px;
        }
        .action-btn {
            padding: 12px 28px;
            background: transparent;
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: #00e5ff;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 140px;
            max-width: 280px;
        }
        .action-btn:hover {
            background: rgba(0, 229, 255, 0.12);
            border-color: #00e5ff;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
        }
        .action-btn.danger {
            border-color: rgba(255, 70, 70, 0.4);
            color: #ff5555;
        }
        .action-btn.danger:hover {
            background: rgba(255, 70, 70, 0.12);
            border-color: #ff5555;
            box-shadow: 0 0 20px rgba(255, 70, 70, 0.15);
        }

        /* ---- MODAL / WIZARD ---- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 16px;
        }
        .modal-box {
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(0, 229, 255, 0.2);
            padding: clamp(20px, 4vw, 34px);
            max-width: 94%;
            width: 550px;
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(0, 229, 255, 0.08);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-box .wizard-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.2rem, 2.5vw, 1.7rem);
            text-align: center;
            color: #00e5ff;
            margin-bottom: 2px;
        }
        .wizard-step-indicators {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 12px 0 16px;
        }
        .step-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #333;
            transition: background 0.3s, transform 0.3s;
        }
        .step-dot.active {
            background: #00e5ff;
            transform: scale(1.3);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.4);
        }
        .wizard-step-content {
            min-height: 160px;
        }
        .wizard-step-content .field {
            margin-bottom: 12px;
        }
        .wizard-step-content .field label {
            display: block;
            color: #aaa;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        .wizard-step-content .field input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            border-radius: 0;
            transition: border-color 0.3s;
        }
        .wizard-step-content .field input:focus {
            border-bottom-color: #00e5ff;
            background: rgba(255, 255, 255, 0.05);
        }
        .wizard-nav {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 16px;
        }
        .wizard-nav button {
            padding: 10px 24px;
            background: transparent;
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: #00e5ff;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
        }
        .wizard-nav button:hover {
            background: rgba(0, 229, 255, 0.1);
            border-color: #00e5ff;
        }
        .wizard-nav button.primary {
            background: #00e5ff;
            color: #000;
            border-color: #00e5ff;
        }
        .wizard-nav button.primary:hover {
            background: #66f0ff;
        }

        /* ---- PHONE FRAME (step 1) ---- */
        .phone-frame {
            width: 200px;
            height: 360px;
            margin: 0 auto 12px;
            border-radius: 30px;
            border: 6px solid #1a1a1a;
            background: #0a0a0a;
            padding: 14px 8px;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.05);
        }
        .phone-frame .notch {
            width: 80px;
            height: 18px;
            background: #000;
            border-radius: 0 0 10px 10px;
            margin: -14px auto 6px;
        }
        .phone-frame .screen {
            background: #111;
            border-radius: 14px;
            padding: 10px 12px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .phone-frame .screen input {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-bottom: 1px solid #00e5ff;
            color: #fff;
            padding: 8px 4px;
            font-size: 0.9rem;
            outline: none;
            width: 100%;
            text-align: center;
        }
        .phone-frame .screen input::placeholder {
            color: #444;
        }

        .hidden {
            display: none !important;
        }

        /* ---- RESPONSIVE ---- */
        @media (max-width: 480px) {
            #map-container {
                height: 220px;
            }
            .device-grid {
                grid-template-columns: 1fr 1fr;
            }
            .action-btn {
                min-width: 100px;
                font-size: 0.8rem;
                padding: 10px 16px;
            }
            .phone-frame {
                width: 160px;
                height: 280px;
            }
        }
        @media (max-width: 380px) {
            .device-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <div class="dashboard-header">
        <h1>THE REAPER</h1>
        <p>Hi <strong id="user-name-display">User</strong>, welcome to the reaper</p>
    </div>

    <!-- ===== MAP ===== -->
    <div id="map-container">
        <div id="map"></div>
    </div>

    <!-- ===== DEVICE DETAILS ===== -->
    <div class="device-details-section" id="device-details-section">
        <div class="section-title">⚡ Registered Device Details</div>
        <div id="device-details-grid" class="device-grid">
            <!-- populated by JS -->
        </div>
        <div id="no-device-message" style="text-align:center;color:#666;padding:16px 0;font-size:1rem;">
            No registered device found. Please set up your device.
        </div>
    </div>

    <!-- ===== ACTION BUTTONS ===== -->
    <div class="action-row">
        <button class="action-btn" id="setup-device-btn">CONTINUE DEVICE SETUP</button>
        <button class="action-btn danger" id="delete-device-btn">DELETE DEVICE</button>
    </div>

    <!-- ===== MODAL (Setup Wizard) ===== -->
    <div id="wizard-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="wizard-title">🔧 DEVICE SETUP</div>
            <!-- Step dots -->
            <div class="wizard-step-indicators">
                <span class="step-dot active" id="dot-1"></span>
                <span class="step-dot" id="dot-2"></span>
                <span class="step-dot" id="dot-3"></span>
            </div>

            <!-- Step 1 -->
            <div id="wizard-step-1" class="wizard-step-content">
                <div style="text-align:center;margin-bottom:6px;color:#888;font-size:0.8rem;">Step 1 · Device Identity</div>
                <div class="phone-frame">
                    <div class="notch"></div>
                    <div class="screen">
                        <label style="color:#aaa;font-size:0.6rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;display:block;">MEI Number</label>
                        <input type="text" id="mei-input" placeholder="Enter MEI / IMEI" />
                    </div>
                </div>
                <p style="color:#555;text-align:center;font-size:0.75rem;">This identifies your device uniquely.</p>
            </div>

            <!-- Step 2 -->
            <div id="wizard-step-2" class="wizard-step-content hidden">
                <div style="text-align:center;margin-bottom:6px;color:#888;font-size:0.8rem;">Step 2 · Contact & Address</div>
                <div class="field">
                    <label>Full Name</label>
                    <input type="text" id="wiz-name" placeholder="John Doe" />
                </div>
                <div class="field">
                    <label>Address</label>
                    <input type="text" id="wiz-address" placeholder="123 Cyber St, Tech City" />
                </div>
                <div class="field">
                    <label>City / Region</label>
                    <input type="text" id="wiz-city" placeholder="Metropolis" />
                </div>
            </div>

            <!-- Step 3 -->
            <div id="wizard-step-3" class="wizard-step-content hidden">
                <div style="text-align:center;margin-bottom:6px;color:#888;font-size:0.8rem;">Step 3 · Extra Security</div>
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="wiz-email" placeholder="your@email.com" />
                </div>
                <div class="field">
                    <label>Phone Number</label>
                    <input type="tel" id="wiz-phone" placeholder="+1 555 000 000" />
                </div>
                <div class="field">
                    <label>Alternative Contact</label>
                    <input type="text" id="wiz-alt" placeholder="Emergency contact" />
                </div>
            </div>

            <!-- Navigation buttons -->
            <div class="wizard-nav">
                <button id="wizard-prev">← BACK</button>
                <button id="wizard-next" class="primary">NEXT →</button>
                <button id="wizard-finish" class="primary hidden">FINISH & REGISTER</button>
            </div>
        </div>
    </div>

    <!-- ===== LEAFLET JS & FIREBASE ===== -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js"
            }
        }
    </script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <script type="module">
        // ------------------ FIREBASE ------------------
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, push, set, get, child, remove, update } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyDye0P37QYNjtRRKh2_At84QCkKCqjceAQ",
            authDomain: "reaper-7b33d.firebaseapp.com",
            databaseURL: "https://reaper-7b33d-default-rtdb.firebaseio.com",
            projectId: "reaper-7b33d",
            storageBucket: "reaper-7b33d.firebasestorage.app",
            messagingSenderId: "1023523985110",
            appId: "1:1023523985110:web:889e2200fad1fa5b98db77",
            measurementId: "G-NQ8F9TKPVZ"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // ------------------ GLOBALS ------------------
        let currentUser = null;
        let registeredDeviceId = null;
        let deviceDataRef = null;
        let map = null;
        let marker = null;
        let collectedDeviceData = {};
        let lastKnownLat = 0;
        let lastKnownLon = 0;
        let locationWatchId = null;
        let updateInterval = null;
        let wizardStep = 1;
        let wizardData = {};

        // ------------------ USER & DEVICE LOAD ------------------
        async function loadUserAndDevice() {
            // Assume user data stored in localStorage after login (set in previous page)
            const uid = localStorage.getItem('reaper_uid');
            const name = localStorage.getItem('reaper_name') || 'User';
            document.getElementById('user-name-display').textContent = name;

            if (!uid) {
                alert('No user session found. Please log in again.');
                window.location.href = 'index.html';
                return;
            }

            currentUser = uid;
            await fetchDeviceData(uid);
            // Start location tracking and updates
            startLocationWatch();
            startPeriodicUpdates();
        }

        async function fetchDeviceData(uid) {
            const userRef = ref(database, 'users/' + uid);
            try {
                const snapshot = await get(userRef);
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const registeredDevices = data.registeredDevices || {};
                    const deviceIds = Object.keys(registeredDevices);
                    if (deviceIds.length > 0) {
                        registeredDeviceId = deviceIds[0]; // take first device
                        deviceDataRef = ref(database, 'users/' + uid + '/registeredDevices/' + registeredDeviceId);
                        const deviceSnap = await get(deviceDataRef);
                        if (deviceSnap.exists()) {
                            const deviceData = deviceSnap.val();
                            renderDeviceDetails(deviceData.deviceDetails || {});
                            // Render location
                            if (deviceData.location) {
                                lastKnownLat = deviceData.location.lat || 0;
                                lastKnownLon = deviceData.location.lon || 0;
                                updateMap(lastKnownLat, lastKnownLon);
                            }
                            // Pre-fill wizard data if exists (for editing)
                            wizardData = { ...deviceData };
                        }
                        document.getElementById('no-device-message').classList.add('hidden');
                        document.getElementById('device-details-grid').classList.remove('hidden');
                        document.getElementById('setup-device-btn').textContent = 'UPDATE DEVICE SETUP';
                    } else {
                        // No device registered
                        document.getElementById('no-device-message').classList.remove('hidden');
                        document.getElementById('device-details-grid').classList.add('hidden');
                        document.getElementById('setup-device-btn').textContent = 'CONTINUE DEVICE SETUP';
                        registeredDeviceId = null;
                        deviceDataRef = null;
                    }
                } else {
                    // No user node yet
                    document.getElementById('no-device-message').classList.remove('hidden');
                    document.getElementById('device-details-grid').classList.add('hidden');
                }
            } catch (err) {
                console.error('Error fetching device:', err);
            }
        }

        // ------------------ RENDER DEVICE DETAILS ------------------
        function renderDeviceDetails(details) {
            const grid = document.getElementById('device-details-grid');
            grid.innerHTML = '';
            if (!details || Object.keys(details).length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#666;">No device details available</div>';
                return;
            }
            for (const [key, value] of Object.entries(details)) {
                const card = document.createElement('div');
                card.className = 'device-card';
                card.innerHTML = `<span class="card-label">${key}</span><span class="card-value">${value || 'N/A'}</span>`;
                grid.appendChild(card);
            }
        }

        // ------------------ MAP ------------------
        function initMap(lat, lon) {
            if (map) {
                map.invalidateSize();
                return;
            }
            map = L.map('map').setView([lat || 0, lon || 0], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);
            if (lat && lon) {
                marker = L.marker([lat, lon]).addTo(map);
            }
        }

        function updateMap(lat, lon) {
            if (!map) {
                initMap(lat, lon);
                return;
            }
            if (marker) {
                marker.setLatLng([lat, lon]);
            } else {
                marker = L.marker([lat, lon]).addTo(map);
            }
            map.setView([lat, lon], map.getZoom(), { animate: true });
        }

        // ------------------ LOCATION TRACKING ------------------
        function startLocationWatch() {
            if (!navigator.geolocation) return;
            locationWatchId = navigator.geolocation.watchPosition(
                (pos) => {
                    lastKnownLat = pos.coords.latitude;
                    lastKnownLon = pos.coords.longitude;
                    if (map) {
                        updateMap(lastKnownLat, lastKnownLon);
                    } else {
                        initMap(lastKnownLat, lastKnownLon);
                    }
                },
                (err) => {
                    console.warn('Location error:', err.message);
                }, {
                    enableHighAccuracy: true,
                    maximumAge: 10000,
                    timeout: 15000
                }
            );
        }

        // ------------------ PERIODIC UPDATES (every 10s) ------------------
        function startPeriodicUpdates() {
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(async () => {
                if (!currentUser || !registeredDeviceId || !deviceDataRef) return;
                // Collect current device info (if not already)
                if (Object.keys(collectedDeviceData).length === 0) {
                    collectedDeviceData = collectDeviceInfo();
                }
                // Update location + device info in Firebase
                const updates = {
                    location: {
                        lat: lastKnownLat || 0,
                        lon: lastKnownLon || 0,
                        timestamp: new Date().toISOString()
                    },
                    deviceDetails: collectedDeviceData,
                    lastUpdated: new Date().toISOString()
                };
                try {
                    await update(deviceDataRef, updates);
                    // Also update the main user's lastSeen
                    const userRef = ref(database, 'users/' + currentUser);
                    await update(userRef, { lastSeen: new Date().toISOString() });
                } catch (err) {
                    // Silently ignore to avoid annoying logs
                }
            }, 10000);
        }

        // ------------------ COLLECT DEVICE INFO ------------------
        function collectDeviceInfo() {
            const ua = navigator.userAgent;
            let browserName = 'Unknown';
            if (ua.indexOf('Firefox') > -1) browserName = 'Firefox';
            else if (ua.indexOf('Chrome') > -1 && ua.indexOf('Edg') === -1) browserName = 'Chrome';
            else if (ua.indexOf('Safari') > -1 && ua.indexOf('Chrome') === -1) browserName = 'Safari';
            else if (ua.indexOf('Edg') > -1) browserName = 'Edge';

            let os = 'Unknown';
            if (ua.indexOf('Windows') > -1) os = 'Windows';
            else if (ua.indexOf('Android') > -1) os = 'Android';
            else if (ua.indexOf('iPhone') > -1 || ua.indexOf('iPad') > -1) os = 'iOS';
            else if (ua.indexOf('Mac') > -1) os = 'macOS';
            else if (ua.indexOf('Linux') > -1) os = 'Linux';

            let deviceType = 'Desktop';
            if (/Mobi|Android|iPhone|iPad|iPod/i.test(ua)) deviceType = /Tablet/i.test(ua) ? 'Tablet' : 'Mobile';

            const screenInfo = `${screen.width} x ${screen.height}`;
            const pixelDensity = window.devicePixelRatio;
            const colorDepth = screen.colorDepth || 'N/A';
            const orientation = screen.orientation ? screen.orientation.type : 'N/A';
            const touchSupport = 'ontouchstart' in window || navigator.maxTouchPoints > 0 ? 'Yes' : 'No';
            const cpuCores = navigator.hardwareConcurrency || 'Unknown';
            const deviceMemory = navigator.deviceMemory || 'Unknown';
            const platform = navigator.platform || 'Unknown';
            const languages = navigator.languages ? navigator.languages.join(', ') : 'Unknown';
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Unknown';

            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            let netType = 'Unknown',
                downlink = 'Unknown',
                rtt = 'Unknown';
            if (connection) {
                netType = connection.effectiveType || 'Unknown';
                downlink = connection.downlink || 'Unknown';
                rtt = connection.rtt || 'Unknown';
            }

            return {
                'Device Type': deviceType,
                'Operating System': os,
                'Browser': browserName,
                'Platform': platform,
                'Languages': languages,
                'Timezone': timezone,
                'Screen Res': screenInfo,
                'Color Depth': colorDepth + ' bit',
                'Pixel Density': pixelDensity.toFixed(2),
                'Orientation': orientation,
                'Touch Support': touchSupport,
                'CPU Cores': cpuCores,
                'RAM (GB)': deviceMemory,
                'Connection Type': netType,
                'Downlink (Mbps)': downlink,
                'RTT (ms)': rtt
            };
        }

        // ------------------ DELETE DEVICE ------------------
        document.getElementById('delete-device-btn').addEventListener('click', async () => {
            if (!currentUser || !registeredDeviceId) {
                alert('No registered device to delete.');
                return;
            }
            if (!confirm('Are you sure you want to DELETE this device? All data will be lost.')) return;
            try {
                await remove(deviceDataRef);
                registeredDeviceId = null;
                deviceDataRef = null;
                document.getElementById('no-device-message').classList.remove('hidden');
                document.getElementById('device-details-grid').classList.add('hidden');
                document.getElementById('setup-device-btn').textContent = 'CONTINUE DEVICE SETUP';
                if (marker) {
                    marker.remove();
                    marker = null;
                }
                alert('Device deleted successfully.');
            } catch (err) {
                alert('Error deleting device. Please try again.');
            }
        });

        // ------------------ WIZARD (SETUP / UPDATE) ------------------
        document.getElementById('setup-device-btn').addEventListener('click', () => {
            openWizard();
        });

        function openWizard() {
            const modal = document.getElementById('wizard-modal');
            modal.classList.remove('hidden');
            wizardStep = 1;
            showWizardStep(1);
            // Pre-fill if data exists (for update)
            if (wizardData) {
                document.getElementById('mei-input').value = wizardData.mei || '';
                document.getElementById('wiz-name').value = wizardData.step2?.name || '';
                document.getElementById('wiz-address').value = wizardData.step2?.address || '';
                document.getElementById('wiz-city').value = wizardData.step2?.city || '';
                document.getElementById('wiz-email').value = wizardData.step3?.email || '';
                document.getElementById('wiz-phone').value = wizardData.step3?.phone || '';
                document.getElementById('wiz-alt').value = wizardData.step3?.alt || '';
            }
        }

        function showWizardStep(step) {
            // Hide all step contents
            document.getElementById('wizard-step-1').classList.add('hidden');
            document.getElementById('wizard-step-2').classList.add('hidden');
            document.getElementById('wizard-step-3').classList.add('hidden');
            document.getElementById('wizard-step-' + step).classList.remove('hidden');

            // Update dots
            for (let i = 1; i <= 3; i++) {
                const dot = document.getElementById('dot-' + i);
                dot.classList.toggle('active', i === step);
            }

            // Buttons
            const prevBtn = document.getElementById('wizard-prev');
            const nextBtn = document.getElementById('wizard-next');
            const finishBtn = document.getElementById('wizard-finish');
            prevBtn.classList.toggle('hidden', step === 1);
            nextBtn.classList.toggle('hidden', step === 3);
            finishBtn.classList.toggle('hidden', step !== 3);
        }

        document.getElementById('wizard-prev').addEventListener('click', () => {
            if (wizardStep > 1) {
                wizardStep--;
                showWizardStep(wizardStep);
            }
        });

        document.getElementById('wizard-next').addEventListener('click', () => {
            if (wizardStep < 3) {
                // Save step data
                saveWizardStepData(wizardStep);
                wizardStep++;
                showWizardStep(wizardStep);
            }
        });

        document.getElementById('wizard-finish').addEventListener('click', async () => {
            // Save last step
            saveWizardStepData(3);
            // Collect MEI
            const mei = document.getElementById('mei-input').value.trim();
            if (!mei) {
                alert('MEI Number is required.');
                return;
            }
            // Final data assembly
            const deviceId = mei; // Use MEI as device ID
            const deviceData = {
                mei: mei,
                step2: {
                    name: document.getElementById('wiz-name').value.trim(),
                    address: document.getElementById('wiz-address').value.trim(),
                    city: document.getElementById('wiz-city').value.trim()
                },
                step3: {
                    email: document.getElementById('wiz-email').value.trim(),
                    phone: document.getElementById('wiz-phone').value.trim(),
                    alt: document.getElementById('wiz-alt').value.trim()
                },
                deviceDetails: collectDeviceInfo(),
                location: {
                    lat: lastKnownLat || 0,
                    lon: lastKnownLon || 0,
                    timestamp: new Date().toISOString()
                },
                registeredAt: new Date().toISOString(),
                lastUpdated: new Date().toISOString()
            };

            try {
                // Save to Firebase
                const deviceRef = ref(database, 'users/' + currentUser + '/registeredDevices/' + deviceId);
                await set(deviceRef, deviceData);
                // Also update user's registeredDeviceId
                await update(ref(database, 'users/' + currentUser), { registeredDeviceId: deviceId });
                // Update local state
                registeredDeviceId = deviceId;
                deviceDataRef = deviceRef;
                wizardData = deviceData;
                // Close modal
                document.getElementById('wizard-modal').classList.add('hidden');
                // Refresh UI
                renderDeviceDetails(deviceData.deviceDetails);
                document.getElementById('no-device-message').classList.add('hidden');
                document.getElementById('device-details-grid').classList.remove('hidden');
                document.getElementById('setup-device-btn').textContent = 'UPDATE DEVICE SETUP';
                updateMap(lastKnownLat, lastKnownLon);
                alert('Device registered successfully!');
            } catch (err) {
                console.error('Save error:', err);
                alert('Error registering device. Please try again.');
            }
        });

        function saveWizardStepData(step) {
            if (step === 1) {
                wizardData.mei = document.getElementById('mei-input').value.trim();
            } else if (step === 2) {
                if (!wizardData.step2) wizardData.step2 = {};
                wizardData.step2.name = document.getElementById('wiz-name').value.trim();
                wizardData.step2.address = document.getElementById('wiz-address').value.trim();
                wizardData.step2.city = document.getElementById('wiz-city').value.trim();
            } else if (step === 3) {
                if (!wizardData.step3) wizardData.step3 = {};
                wizardData.step3.email = document.getElementById('wiz-email').value.trim();
                wizardData.step3.phone = document.getElementById('wiz-phone').value.trim();
                wizardData.step3.alt = document.getElementById('wiz-alt').value.trim();
            }
        }

        // ------------------ INIT ------------------
        document.addEventListener('DOMContentLoaded', () => {
            initMap(0, 0);
            loadUserAndDevice();
        });

        // Handle modal close via escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('wizard-modal').classList.add('hidden');
            }
        });

        // Close modal on overlay click
        document.getElementById('wizard-modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                document.getElementById('wizard-modal').classList.add('hidden');
            }
        });
    </script>

</body>
</html>
