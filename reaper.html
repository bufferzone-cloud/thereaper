<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Reaper · Tracking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ---------- RESET & FULLSCREEN ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
        }

        /* ---------- FULLSCREEN MAP ---------- */
        #map-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }
        #map {
            width: 100%;
            height: 100%;
        }

        /* ---------- FLOATING UI WRAPPER ---------- */
        .floating-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        .floating-ui>* {
            pointer-events: auto;
        }

        /* ---------- HEADER (top center) ---------- */
        .ui-header {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            padding: 10px 28px 12px;
            border-radius: 16px;
            border: 1px solid rgba(0, 229, 255, 0.15);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            min-width: 200px;
            white-space: nowrap;
        }
        .ui-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.2rem, 2.2vw, 1.8rem);
            background: linear-gradient(90deg, #00e5ff, #0077ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.04em;
            line-height: 1.2;
        }
        .ui-header .sub {
            font-size: clamp(0.6rem, 1vw, 0.8rem);
            color: #aaa;
            -webkit-text-fill-color: #aaa;
            letter-spacing: 0.15em;
        }

        /* ---------- STATUS MESSAGE (tiny, floating) ---------- */
        .ui-status {
            position: absolute;
            top: 82px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 4px 16px;
            border-radius: 30px;
            font-size: clamp(0.55rem, 0.8vw, 0.7rem);
            font-weight: 600;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }
        .ui-status.registered {
            border-color: #00e5ff;
            color: #00e5ff;
            background: rgba(0, 229, 255, 0.08);
        }
        .ui-status.registered .status-icon {
            color: #00e5ff;
        }
        .ui-status.unregistered {
            border-color: #ffcc00;
            color: #ffcc00;
            background: rgba(255, 200, 0, 0.08);
        }
        .ui-status.unregistered .status-icon {
            color: #ffcc00;
        }
        .ui-status .status-icon {
            margin-right: 4px;
        }

        /* ---------- DEVICE DETAILS (bottom left) ---------- */
        .ui-details {
            position: absolute;
            bottom: 24px;
            left: 24px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 16px;
            padding: 14px 18px 16px;
            border: 1px solid rgba(0, 229, 255, 0.08);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            max-width: 340px;
            width: calc(100% - 48px);
            max-height: 40vh;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .ui-details .title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.6rem, 1vw, 0.75rem);
            color: #00e5ff;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ui-details .title span {
            font-size: 0.7rem;
            opacity: 0.5;
        }
        .device-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 10px;
            max-height: 32vh;
            overflow-y: auto;
            padding-right: 4px;
        }
        .device-grid::-webkit-scrollbar {
            width: 3px;
        }
        .device-grid::-webkit-scrollbar-thumb {
            background: #00e5ff;
            border-radius: 6px;
        }
        .device-grid::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }
        .device-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.6rem;
            border-left: 1px solid rgba(0, 229, 255, 0.1);
        }
        .device-card .c-label {
            color: #00e5ff;
            font-weight: 600;
            display: block;
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        .device-card .c-value {
            color: #ddd;
            word-break: break-word;
            font-size: 0.6rem;
        }
        .no-device-msg {
            color: #666;
            font-size: 0.7rem;
            text-align: center;
            padding: 12px 0;
        }

        /* ---------- ACTION BUTTONS (bottom center) ---------- */
        .ui-actions {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid rgba(0, 229, 255, 0.08);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            max-width: 92%;
        }
        .ui-actions .btn {
            padding: 8px 18px;
            background: transparent;
            border: 1px solid rgba(0, 229, 255, 0.25);
            color: #00e5ff;
            font-weight: 700;
            font-size: clamp(0.6rem, 0.9vw, 0.75rem);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
            background: rgba(0, 229, 255, 0.03);
        }
        .ui-actions .btn:hover {
            background: rgba(0, 229, 255, 0.15);
            border-color: #00e5ff;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.08);
        }
        .ui-actions .btn-track {
            border-color: rgba(0, 229, 255, 0.5);
            background: rgba(0, 229, 255, 0.08);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.05);
        }
        .ui-actions .btn-track:hover {
            background: rgba(0, 229, 255, 0.2);
            border-color: #00e5ff;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.15);
        }
        .btn.hidden {
            display: none !important;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 640px) {
            .ui-header {
                top: 12px;
                padding: 6px 16px 8px;
                min-width: unset;
                white-space: normal;
            }
            .ui-status {
                top: 68px;
                font-size: 0.5rem;
                padding: 2px 12px;
                white-space: nowrap;
            }
            .ui-details {
                bottom: 80px;
                left: 12px;
                right: 12px;
                width: auto;
                max-width: unset;
                padding: 10px 12px 12px;
                max-height: 25vh;
            }
            .device-grid {
                grid-template-columns: 1fr 1fr;
                gap: 3px 6px;
                max-height: 18vh;
            }
            .ui-actions {
                bottom: 12px;
                padding: 6px 12px;
                gap: 6px;
                width: calc(100% - 24px);
            }
            .ui-actions .btn {
                padding: 5px 12px;
                font-size: 0.55rem;
                letter-spacing: 0.5px;
            }
        }
        @media (max-width: 400px) {
            .ui-header h1 {
                font-size: 0.9rem;
            }
            .device-grid {
                grid-template-columns: 1fr;
            }
            .ui-actions .btn {
                font-size: 0.45rem;
                padding: 4px 8px;
            }
        }

        /* ---------- LEAFLET ROUTING HIDE ---------- */
        .leaflet-routing-container {
            display: none !important;
        }
        .leaflet-routing-alt {
            display: none !important;
        }
        .leaflet-routing-geocoder {
            display: none !important;
        }
        .leaflet-routing-error {
            display: none !important;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- ===== FULLSCREEN MAP ===== -->
    <div id="map-container">
        <div id="map"></div>
    </div>

    <!-- ===== FLOATING UI ===== -->
    <div class="floating-ui">

        <!-- HEADER -->
        <div class="ui-header">
            <h1>THE REAPER</h1>
            <div class="sub">tracking active</div>
        </div>

        <!-- STATUS MESSAGE -->
        <div class="ui-status unregistered" id="device-status">
            <span class="status-icon">⏳</span>
            <span id="status-text">Checking device…</span>
        </div>

        <!-- DEVICE DETAILS (bottom left) -->
        <div class="ui-details" id="ui-details">
            <div class="title">⚡ <span>DEVICE DETAILS</span></div>
            <div id="device-details-grid" class="device-grid"></div>
            <div id="no-device-message" class="no-device-msg">No registered device details found.</div>
        </div>

        <!-- ACTION BUTTONS (bottom center) -->
        <div class="ui-actions">
            <button class="btn btn-track hidden" id="track-device-btn">📍 TRACK DEVICE</button>
            <button class="btn" id="logout-btn">LOGOUT</button>
        </div>

    </div>

    <!-- ===== MAP & ROUTING LIBRARIES ===== -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js">
    </script>

    <!-- ===== FIREBASE IMPORTS ===== -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js"
            }
        }
    </script>

    <!-- ===== MAIN APP ===== -->
    <script type="module">
        // ================================================================
        //  MODULE IMPORTS
        // ================================================================
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, get, set, update } from "firebase/database";
        import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";

        // ================================================================
        //  FIREBASE CONFIG
        // ================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDye0P37QYNjtRRKh2_At84QCkKCqjceAQ",
            authDomain: "reaper-7b33d.firebaseapp.com",
            databaseURL: "https://reaper-7b33d-default-rtdb.firebaseio.com",
            projectId: "reaper-7b33d",
            storageBucket: "reaper-7b33d.firebasestorage.app",
            messagingSenderId: "1023523985110",
            appId: "1:1023523985110:web:889e2200fad1fa5b98db77",
            measurementId: "G-NQ8F9TKPVZ"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);

        // ================================================================
        //  GLOBAL STATE
        // ================================================================
        let map = null;
        let phoneMarker = null;
        let currentMarker = null;
        let routingControl = null;
        let lastKnownLat = 0;
        let lastKnownLon = 0;
        let locationWatchId = null;
        let updateInterval = null;
        let isRegisteredDevice = false;
        let currentUid = null;
        let registeredDeviceId = null;
        let currentDeviceId = null;
        let deviceDataRef = null;

        // DOM refs
        const statusEl = document.getElementById('device-status');
        const statusText = document.getElementById('status-text');
        const trackBtn = document.getElementById('track-device-btn');
        const deviceGrid = document.getElementById('device-details-grid');
        const noDeviceMsg = document.getElementById('no-device-message');
        const logoutBtn = document.getElementById('logout-btn');

        // ================================================================
        //  AUTH STATE LISTENER
        // ================================================================
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUid = user.uid;
                currentDeviceId = localStorage.getItem('reaper_device_id');
                await loadDeviceData();
                startLocationWatch();
                startPeriodicUpdates();
            } else {
                alert('Please log in again.');
                window.location.href = 'index.html';
            }
        });

        // ================================================================
        //  LOGOUT HANDLER
        // ================================================================
        logoutBtn.addEventListener('click', async () => {
            if (updateInterval) clearInterval(updateInterval);
            if (locationWatchId) navigator.geolocation.clearWatch(locationWatchId);
            await signOut(auth);
            window.location.href = 'index.html';
        });

        // ================================================================
        //  LOAD DEVICE DATA & CHECK STATUS
        // ================================================================
        async function loadDeviceData() {
            if (!currentUid) return;

            const userRef = ref(database, 'users/' + currentUid);

            try {
                const snap = await get(userRef);

                if (snap.exists()) {
                    const data = snap.val();
                    const registeredId = data.registeredDeviceId || null;
                    registeredDeviceId = registeredId;

                    // ---- 1. Determine device status ----
                    if (registeredId && currentDeviceId && registeredId === currentDeviceId) {
                        isRegisteredDevice = true;
                        statusEl.className = 'ui-status registered';
                        statusText.textContent = '✓ User is logged in on registered device';
                        trackBtn.classList.add('hidden');
                    } else if (registeredId) {
                        isRegisteredDevice = false;
                        statusEl.className = 'ui-status unregistered';
                        statusText.textContent = '⚠ User logged in on an unregistered device';
                        trackBtn.classList.remove('hidden');
                    } else {
                        isRegisteredDevice = false;
                        statusEl.className = 'ui-status unregistered';
                        statusText.textContent = '⚠ No registered device found for this user';
                        trackBtn.classList.add('hidden');
                    }

                    // ---- 2. Render device details ----
                    if (data.deviceInfo) {
                        renderDeviceDetails(data.deviceInfo);
                        noDeviceMsg.classList.add('hidden');
                        deviceGrid.classList.remove('hidden');
                    } else {
                        noDeviceMsg.classList.remove('hidden');
                        deviceGrid.innerHTML = '';
                    }

                    // ---- 3. Phone location (from Firebase) ----
                    const phoneLoc = data.phoneLocation || { lat: 0, lon: 0 };
                    updatePhoneMarker(phoneLoc.lat, phoneLoc.lon);

                    // ---- 4. Current device location ----
                    if (lastKnownLat && lastKnownLon) {
                        updateCurrentMarker(lastKnownLat, lastKnownLon);
                    }

                    // ---- 5. Setup device reference for updates ----
                    if (registeredId) {
                        deviceDataRef = ref(database, 'users/' + currentUid + '/registeredDevices/' + registeredId);
                    }

                } else {
                    // No user data exists
                    noDeviceMsg.classList.remove('hidden');
                    deviceGrid.innerHTML = '';
                    statusEl.className = 'ui-status unregistered';
                    statusText.textContent = '⚠ No device data found';
                    trackBtn.classList.add('hidden');
                }

            } catch (err) {
                console.error('Error loading device data:', err);
                statusEl.className = 'ui-status unregistered';
                statusText.textContent = '⚠ Error loading device data';
                trackBtn.classList.add('hidden');
            }
        }

        // ================================================================
        //  RENDER DEVICE DETAILS
        // ================================================================
        function renderDeviceDetails(details) {
            deviceGrid.innerHTML = '';
            if (!details || Object.keys(details).length === 0) {
                deviceGrid.innerHTML =
                    '<div style="grid-column:1/-1;text-align:center;color:#666;font-size:0.6rem;">No device details available</div>';
                return;
            }
            for (const [key, value] of Object.entries(details)) {
                const card = document.createElement('div');
                card.className = 'device-card';
                card.innerHTML = `<span class="c-label">${key}</span><span class="c-value">${value || 'N/A'}</span>`;
                deviceGrid.appendChild(card);
            }
        }

        // ================================================================
        //  MAP INITIALIZATION
        // ================================================================
        function initMap(lat, lon) {
            if (map) return;
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([lat || 0, lon || 0], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: ''
            }).addTo(map);
            if (lat && lon) updatePhoneMarker(lat, lon);
        }

        // ================================================================
        //  UPDATE PHONE MARKER (📱)
        // ================================================================
        function updatePhoneMarker(lat, lon) {
            if (!map) {
                initMap(lat, lon);
                return;
            }
            if (phoneMarker) {
                phoneMarker.setLatLng([lat, lon]);
            } else {
                const icon = L.divIcon({
                    html: '📱',
                    iconSize: [28, 28],
                    iconAnchor: [14, 28]
                });
                phoneMarker = L.marker([lat, lon], { icon }).addTo(map)
                    .bindPopup('<b>Registered Phone</b><br>Last known location');
            }
            if (currentMarker) {
                const cur = currentMarker.getLatLng();
                const bounds = L.latLngBounds([cur.lat, cur.lng], [lat, lon]);
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });
            } else {
                map.setView([lat, lon], 14, { animate: true });
            }
        }

        // ================================================================
        //  UPDATE CURRENT MARKER (📍)
        // ================================================================
        function updateCurrentMarker(lat, lon) {
            if (!map) {
                initMap(lat, lon);
                return;
            }
            if (currentMarker) {
                currentMarker.setLatLng([lat, lon]);
            } else {
                const icon = L.divIcon({
                    html: '📍',
                    iconSize: [28, 28],
                    iconAnchor: [14, 28]
                });
                currentMarker = L.marker([lat, lon], { icon }).addTo(map)
                    .bindPopup('<b>You are here</b><br>Current device location');
            }
            if (phoneMarker) {
                const phone = phoneMarker.getLatLng();
                const bounds = L.latLngBounds([lat, lon], [phone.lat, phone.lng]);
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });
            } else {
                map.setView([lat, lon], 14, { animate: true });
            }
        }

        // ================================================================
        //  GET PHONE LOCATION
        // ================================================================
        function getPhoneLocation() {
            if (!phoneMarker) return null;
            const p = phoneMarker.getLatLng();
            return { lat: p.lat, lon: p.lng };
        }

        // ================================================================
        //  GET CURRENT LOCATION
        // ================================================================
        function getCurrentLocation() {
            if (currentMarker) {
                const p = currentMarker.getLatLng();
                return { lat: p.lat, lon: p.lng };
            }
            if (lastKnownLat && lastKnownLon) {
                return { lat: lastKnownLat, lon: lastKnownLon };
            }
            return null;
        }

        // ================================================================
        //  TRACK DEVICE BUTTON — draws route between both devices
        // ================================================================
        trackBtn.addEventListener('click', async () => {
            if (!map) {
                alert('Map is not ready yet.');
                return;
            }

            const phoneLoc = getPhoneLocation();
            const currentLoc = getCurrentLocation();

            if (!phoneLoc || !currentLoc) {
                alert('Missing location data for either the registered device or your current device.');
                return;
            }

            // Clear any existing route
            if (routingControl) {
                map.removeControl(routingControl);
                routingControl = null;
            }

            // Zoom to fit both points
            const bounds = L.latLngBounds([currentLoc.lat, currentLoc.lon], [phoneLoc.lat, phoneLoc.lon]);
            map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });

            // Attempt to draw a route
            const waypoints = [
                L.latLng(currentLoc.lat, currentLoc.lon),
                L.latLng(phoneLoc.lat, phoneLoc.lon)
            ];

            try {
                routingControl = L.Routing.control({
                    waypoints: waypoints,
                    lineOptions: {
                        styles: [{ color: '#00e5ff', weight: 3, opacity: 0.8 }]
                    },
                    showAlternatives: false,
                    fitSelectedRoutes: false,
                    router: L.Routing.osrmv1({
                        serviceUrl: 'https://routing.openstreetmap.de/routed-foot/route/v1'
                    }),
                    createMarker: function(i, waypoint, n) {
                        return null; // Don't create extra markers
                    }
                }).addTo(map);

                routingControl.on('routingerror', function(e) {
                    console.warn('Routing error:', e.error);
                    // Map is already zoomed to both points
                });

            } catch (err) {
                console.warn('Error creating routing control:', err);
            }
        });

        // ================================================================
        //  LOCATION WATCH — tracks current device position
        // ================================================================
        function startLocationWatch() {
            if (!navigator.geolocation) return;
            if (locationWatchId) navigator.geolocation.clearWatch(locationWatchId);

            locationWatchId = navigator.geolocation.watchPosition(
                (pos) => {
                    lastKnownLat = pos.coords.latitude;
                    lastKnownLon = pos.coords.longitude;
                    updateCurrentMarker(lastKnownLat, lastKnownLon);

                    // If this is the registered device, update phoneLocation in Firebase
                    if (isRegisteredDevice && currentUid && registeredDeviceId) {
                        const locRef = ref(database, 'users/' + currentUid + '/registeredDevices/' + registeredDeviceId +
                            '/phoneLocation');
                        set(locRef, {
                            lat: lastKnownLat,
                            lon: lastKnownLon,
                            timestamp: new Date().toISOString()
                        }).catch(() => {});
                    }

                    // Always save current location for other devices to see
                    if (currentUid) {
                        const curRef = ref(database, 'users/' + currentUid + '/currentLocation');
                        set(curRef, {
                            lat: lastKnownLat,
                            lon: lastKnownLon,
                            timestamp: new Date().toISOString()
                        }).catch(() => {});
                    }
                },
                (err) => {
                    console.warn('Location error:', err.message);
                }, {
                    enableHighAccuracy: true,
                    maximumAge: 5000,
                    timeout: 10000
                }
            );
        }

        // ================================================================
        //  PERIODIC UPDATES — every 10 seconds
        // ================================================================
        function startPeriodicUpdates() {
            if (updateInterval) clearInterval(updateInterval);

            updateInterval = setInterval(async () => {
                if (!currentUid || !registeredDeviceId) return;

                // Update user's lastSeen
                try {
                    const userRef = ref(database, 'users/' + currentUid);
                    await update(userRef, { lastSeen: new Date().toISOString() });
                } catch (_) {}

                // If this is the registered device, also update device details
                if (isRegisteredDevice && deviceDataRef) {
                    try {
                        const details = collectDeviceInfo();
                        await update(deviceDataRef, {
                            deviceDetails: details,
                            lastUpdated: new Date().toISOString()
                        });
                    } catch (_) {}
                }
            }, 10000);
        }

        // ================================================================
        //  COLLECT DEVICE INFO (for periodic updates)
        // ================================================================
        function collectDeviceInfo() {
            const ua = navigator.userAgent;
            let browserName = 'Unknown';
            if (ua.indexOf('Firefox') > -1) browserName = 'Firefox';
            else if (ua.indexOf('Chrome') > -1 && ua.indexOf('Edg') === -1) browserName = 'Chrome';
            else if (ua.indexOf('Safari') > -1 && ua.indexOf('Chrome') === -1) browserName = 'Safari';
            else if (ua.indexOf('Edg') > -1) browserName = 'Edge';

            let os = 'Unknown';
            if (ua.indexOf('Windows') > -1) os = 'Windows';
            else if (ua.indexOf('Android') > -1) os = 'Android';
            else if (ua.indexOf('iPhone') > -1 || ua.indexOf('iPad') > -1) os = 'iOS';
            else if (ua.indexOf('Mac') > -1) os = 'macOS';
            else if (ua.indexOf('Linux') > -1) os = 'Linux';

            let deviceType = 'Desktop';
            if (/Mobi|Android|iPhone|iPad|iPod/i.test(ua)) deviceType = /Tablet/i.test(ua) ? 'Tablet' : 'Mobile';

            const screenInfo = `${screen.width} x ${screen.height}`;
            const pixelDensity = window.devicePixelRatio;
            const cpuCores = navigator.hardwareConcurrency || 'Unknown';
            const deviceMemory = navigator.deviceMemory || 'Unknown';

            return {
                'Device Type': deviceType,
                'Operating System': os,
                'Browser': browserName,
                'Screen Res': screenInfo,
                'Pixel Density': pixelDensity.toFixed(2),
                'CPU Cores': cpuCores,
                'RAM (GB)': deviceMemory
            };
        }

        // ================================================================
        //  INIT MAP ON DOM LOAD
        // ================================================================
        document.addEventListener('DOMContentLoaded', () => {
            initMap(0, 0);
        });

        // ================================================================
        //  HANDLE WINDOW RESIZE
        // ================================================================
        window.addEventListener('resize', () => {
            if (map) map.invalidateSize();
        });

        // ================================================================
        //  LOG STARTUP
        // ================================================================
        console.log('🔮 The Reaper · Tracking Dashboard initialized');
    </script>
</body>
</html>
