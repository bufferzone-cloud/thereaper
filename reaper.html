<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Reaper · Tracking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ---------- RESET & FULLSCREEN ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
        }

        /* ---------- FULLSCREEN MAP ---------- */
        #map-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }
        #map {
            width: 100%;
            height: 100%;
        }

        /* ---------- FLOATING UI WRAPPER ---------- */
        .floating-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        .floating-ui>* {
            pointer-events: auto;
        }

        /* ---------- HEADER (top center) ---------- */
        .ui-header {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            padding: 10px 28px 12px;
            border-radius: 16px;
            border: 1px solid rgba(0, 229, 255, 0.15);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            min-width: 200px;
            white-space: nowrap;
        }
        .ui-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.2rem, 2.2vw, 1.8rem);
            background: linear-gradient(90deg, #00e5ff, #0077ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.04em;
            line-height: 1.2;
        }
        .ui-header .sub {
            font-size: clamp(0.6rem, 1vw, 0.8rem);
            color: #aaa;
            -webkit-text-fill-color: #aaa;
            letter-spacing: 0.15em;
        }

        /* ---------- STATUS MESSAGE ---------- */
        .ui-status {
            position: absolute;
            top: 82px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 4px 16px;
            border-radius: 30px;
            font-size: clamp(0.55rem, 0.8vw, 0.7rem);
            font-weight: 600;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }
        .ui-status.registered {
            border-color: #00e5ff;
            color: #00e5ff;
            background: rgba(0, 229, 255, 0.08);
        }
        .ui-status.unregistered {
            border-color: #ffcc00;
            color: #ffcc00;
            background: rgba(255, 200, 0, 0.08);
        }

        /* ---------- DEVICE DETAILS (bottom left) ---------- */
        .ui-details {
            position: absolute;
            bottom: 100px;
            left: 24px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 16px;
            padding: 14px 18px 16px;
            border: 1px solid rgba(0, 229, 255, 0.08);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            max-width: 340px;
            width: calc(100% - 48px);
            max-height: 40vh;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .ui-details .title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.6rem, 1vw, 0.75rem);
            color: #00e5ff;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ui-details .title span {
            font-size: 0.7rem;
            opacity: 0.5;
        }
        .device-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 10px;
            max-height: 32vh;
            overflow-y: auto;
            padding-right: 4px;
        }
        .device-grid::-webkit-scrollbar {
            width: 3px;
        }
        .device-grid::-webkit-scrollbar-thumb {
            background: #00e5ff;
            border-radius: 6px;
        }
        .device-grid::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }
        .device-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.6rem;
            border-left: 1px solid rgba(0, 229, 255, 0.1);
        }
        .device-card .c-label {
            color: #00e5ff;
            font-weight: 600;
            display: block;
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        .device-card .c-value {
            color: #ddd;
            word-break: break-word;
            font-size: 0.6rem;
        }
        .no-device-msg {
            color: #666;
            font-size: 0.7rem;
            text-align: center;
            padding: 12px 0;
        }

        /* ---------- ACTION BUTTONS (bottom center) ---------- */
        .ui-actions {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            padding: 8px 14px;
            border-radius: 40px;
            border: 1px solid rgba(0, 229, 255, 0.08);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            max-width: 92%;
        }
        .ui-actions .btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid rgba(0, 229, 255, 0.25);
            color: #00e5ff;
            font-weight: 700;
            font-size: clamp(0.55rem, 0.8vw, 0.7rem);
            letter-spacing: 1.2px;
            text-transform: uppercase;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
            background: rgba(0, 229, 255, 0.03);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ui-actions .btn:hover {
            background: rgba(0, 229, 255, 0.15);
            border-color: #00e5ff;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.08);
        }
        .ui-actions .btn-track {
            border-color: rgba(0, 229, 255, 0.5);
            background: rgba(0, 229, 255, 0.08);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.05);
        }
        .ui-actions .btn-track:hover {
            background: rgba(0, 229, 255, 0.2);
            border-color: #00e5ff;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.15);
        }
        .ui-actions .btn-danger {
            border-color: rgba(255, 70, 70, 0.3);
            color: #ff5555;
            background: rgba(255, 70, 70, 0.05);
        }
        .ui-actions .btn-danger:hover {
            background: rgba(255, 70, 70, 0.15);
            border-color: #ff5555;
            box-shadow: 0 0 30px rgba(255, 70, 70, 0.08);
        }
        .ui-actions .btn-call {
            border-color: rgba(0, 229, 255, 0.3);
            color: #00e5ff;
            background: rgba(0, 229, 255, 0.05);
        }
        .ui-actions .btn-call:hover {
            background: rgba(0, 229, 255, 0.15);
            border-color: #00e5ff;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.08);
        }
        .btn.hidden {
            display: none !important;
        }

        /* ---------- ICONS ---------- */
        .icon-svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            display: inline-block;
            vertical-align: middle;
            flex-shrink: 0;
        }

        /* ---------- RING MODAL (60% transparency) ---------- */
        .ring-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .ring-modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .ring-modal-box {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 24px;
            padding: 40px 48px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .ring-modal-overlay.active .ring-modal-box {
            transform: scale(1);
        }
        .ring-modal-box .bell-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            animation: ringBell 0.6s ease-in-out infinite alternate;
        }
        @keyframes ringBell {
            0% {
                transform: rotate(-8deg) scale(1);
            }
            100% {
                transform: rotate(8deg) scale(1.05);
            }
        }
        .ring-modal-box .bell-icon svg {
            width: 100%;
            height: 100%;
            fill: #00e5ff;
            filter: drop-shadow(0 0 20px rgba(0, 229, 255, 0.3));
        }
        .ring-modal-box h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: #00e5ff;
            margin-bottom: 6px;
        }
        .ring-modal-box p {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .ring-modal-box .btn-stop-ring {
            padding: 10px 32px;
            background: #00e5ff;
            color: #000;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .ring-modal-box .btn-stop-ring:hover {
            background: #66f0ff;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.3);
        }
        .ring-modal-box .btn-stop-ring.hidden {
            display: none !important;
        }

        /* ---------- TOAST MESSAGE (for unregistered device) ---------- */
        .toast-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 16px;
            padding: 30px 40px;
            text-align: center;
            z-index: 90;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
        }
        .toast-message.active {
            opacity: 1;
            visibility: visible;
        }
        .toast-message .toast-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            display: block;
        }
        .toast-message h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: #00e5ff;
            margin-bottom: 4px;
        }
        .toast-message p {
            color: #ccc;
            font-size: 0.85rem;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 640px) {
            .ui-header {
                top: 12px;
                padding: 6px 16px 8px;
                min-width: unset;
                white-space: normal;
            }
            .ui-status {
                top: 68px;
                font-size: 0.5rem;
                padding: 2px 12px;
                white-space: nowrap;
            }
            .ui-details {
                bottom: 90px;
                left: 12px;
                right: 12px;
                width: auto;
                max-width: unset;
                padding: 10px 12px 12px;
                max-height: 25vh;
            }
            .device-grid {
                grid-template-columns: 1fr 1fr;
                gap: 3px 6px;
                max-height: 18vh;
            }
            .ui-actions {
                bottom: 12px;
                padding: 6px 10px;
                gap: 4px;
                width: calc(100% - 24px);
            }
            .ui-actions .btn {
                padding: 4px 10px;
                font-size: 0.45rem;
                letter-spacing: 0.5px;
                gap: 4px;
            }
            .icon-svg {
                width: 12px;
                height: 12px;
            }
            .ring-modal-box {
                padding: 28px 20px;
            }
            .ring-modal-box .bell-icon {
                width: 56px;
                height: 56px;
            }
            .ring-modal-box h2 {
                font-size: 0.9rem;
            }
            .toast-message {
                padding: 20px 24px;
            }
            .toast-message .toast-icon {
                font-size: 2.2rem;
            }
            .toast-message h3 {
                font-size: 0.9rem;
            }
        }
        @media (max-width: 400px) {
            .ui-header h1 {
                font-size: 0.9rem;
            }
            .device-grid {
                grid-template-columns: 1fr;
            }
            .ui-actions .btn {
                font-size: 0.4rem;
                padding: 3px 8px;
            }
        }

        /* ---------- LEAFLET ROUTING HIDE ---------- */
        .leaflet-routing-container {
            display: none !important;
        }
        .leaflet-routing-alt {
            display: none !important;
        }
        .leaflet-routing-geocoder {
            display: none !important;
        }
        .leaflet-routing-error {
            display: none !important;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- ===== FULLSCREEN MAP ===== -->
    <div id="map-container">
        <div id="map"></div>
    </div>

    <!-- ===== FLOATING UI ===== -->
    <div class="floating-ui">

        <!-- HEADER -->
        <div class="ui-header">
            <h1>THE REAPER</h1>
            <div class="sub">tracking active</div>
        </div>

        <!-- STATUS MESSAGE -->
        <div class="ui-status unregistered" id="device-status">
            <span id="status-text">Checking device…</span>
        </div>

        <!-- DEVICE DETAILS (bottom left) -->
        <div class="ui-details" id="ui-details">
            <div class="title">⚡ <span>DEVICE DETAILS</span></div>
            <div id="device-details-grid" class="device-grid"></div>
            <div id="no-device-message" class="no-device-msg">No registered device details found.</div>
        </div>

        <!-- ACTION BUTTONS (bottom center) -->
        <div class="ui-actions" id="action-buttons">
            <button class="btn btn-track hidden" id="track-device-btn">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                TRACK
            </button>
            <button class="btn btn-call hidden" id="ring-device-btn">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                RING
            </button>
            <button class="btn btn-danger hidden" id="kill-switch-btn">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
                KILL
            </button>
            <button class="btn" id="logout-btn">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                LOGOUT
            </button>
        </div>

    </div>

    <!-- ===== RING MODAL (shown on registered device) ===== -->
    <div class="ring-modal-overlay" id="ring-modal">
        <div class="ring-modal-box">
            <div class="bell-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5S11.5 3.17 11.5 4v.68C8.64 5.36 7 7.92 7 11v5l-2 2v1h16v-1l-2-2z" fill="currentColor"/>
                    <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5S11.5 3.17 11.5 4v.68C8.64 5.36 7 7.92 7 11v5l-2 2v1h16v-1l-2-2z" fill="currentColor" opacity="0.3"/>
                </svg>
            </div>
            <h2>🔔 INCOMING RING</h2>
            <p>Your device is ringing.<br/>Click STOP to silence.</p>
            <button class="btn-stop-ring" id="stop-ring-btn">STOP RING</button>
        </div>
    </div>

    <!-- ===== TOAST MESSAGE (shown on unregistered device) ===== -->
    <div class="toast-message" id="ring-toast">
        <span class="toast-icon">📞</span>
        <h3>Your registered phone is ringing</h3>
        <p>Listen closely to locate the device.</p>
    </div>

    <!-- ===== MAP & ROUTING LIBRARIES ===== -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js">
    </script>

    <!-- ===== FIREBASE IMPORTS ===== -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js"
            }
        }
    </script>

    <!-- ===== MAIN APP ===== -->
    <script type="module">
        // ================================================================
        //  MODULE IMPORTS
        // ================================================================
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, get, set, update, remove, onValue } from "firebase/database";
        import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";

        // ================================================================
        //  FIREBASE CONFIG
        // ================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDye0P37QYNjtRRKh2_At84QCkKCqjceAQ",
            authDomain: "reaper-7b33d.firebaseapp.com",
            databaseURL: "https://reaper-7b33d-default-rtdb.firebaseio.com",
            projectId: "reaper-7b33d",
            storageBucket: "reaper-7b33d.firebasestorage.app",
            messagingSenderId: "1023523985110",
            appId: "1:1023523985110:web:889e2200fad1fa5b98db77",
            measurementId: "G-NQ8F9TKPVZ"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);

        // ================================================================
        //  GLOBAL STATE
        // ================================================================
        let map = null;
        let phoneMarker = null;
        let currentMarker = null;
        let pulseCircle = null;
        let routingControl = null;
        let lastKnownLat = 0;
        let lastKnownLon = 0;
        let locationWatchId = null;
        let updateInterval = null;
        let isRegisteredDevice = false;
        let currentUid = null;
        let registeredDeviceId = null;
        let currentDeviceId = null;
        let deviceDataRef = null;
        let ringAudioContext = null;
        let ringInterval = null;
        let isRinging = false;
        let ringCommandRef = null;

        // DOM refs
        const statusEl = document.getElementById('device-status');
        const statusText = document.getElementById('status-text');
        const trackBtn = document.getElementById('track-device-btn');
        const ringBtn = document.getElementById('ring-device-btn');
        const killBtn = document.getElementById('kill-switch-btn');
        const deviceGrid = document.getElementById('device-details-grid');
        const noDeviceMsg = document.getElementById('no-device-message');
        const logoutBtn = document.getElementById('logout-btn');
        const ringModal = document.getElementById('ring-modal');
        const stopRingBtn = document.getElementById('stop-ring-btn');
        const ringToast = document.getElementById('ring-toast');

        // ================================================================
        //  AUTH STATE LISTENER
        // ================================================================
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUid = user.uid;
                currentDeviceId = localStorage.getItem('reaper_device_id');
                await loadDeviceData();
                startLocationWatch();
                startPeriodicUpdates();
                // Listen for phone location changes from Firebase
                listenToPhoneLocation();
                // Listen for ring commands
                listenToRingCommands();
            } else {
                alert('Please log in again.');
                window.location.href = 'index.html';
            }
        });

        // ================================================================
        //  LISTEN TO PHONE LOCATION (real-time updates)
        // ================================================================
        function listenToPhoneLocation() {
            if (!currentUid || !registeredDeviceId) return;
            const phoneLocRef = ref(database, 'users/' + currentUid + '/registeredDevices/' + registeredDeviceId + '/phoneLocation');
            onValue(phoneLocRef, (snapshot) => {
                if (snapshot.exists()) {
                    const loc = snapshot.val();
                    if (loc.lat && loc.lon) {
                        updatePhoneMarker(loc.lat, loc.lon);
                    }
                }
            });
        }

        // ================================================================
        //  LISTEN TO RING COMMANDS
        // ================================================================
        function listenToRingCommands() {
            if (!currentUid) return;
            ringCommandRef = ref(database, 'users/' + currentUid + '/ringCommand');
            onValue(ringCommandRef, (snapshot) => {
                const command = snapshot.val();
                if (command === true) {
                    // Ring command received — start ringing on this device
                    if (isRegisteredDevice) {
                        // Registered device: start ringing
                        startRing();
                    } else {
                        // Unregistered device: show toast message
                        showRingToast();
                    }
                } else if (command === false) {
                    // Stop ring command
                    stopRing();
                    hideRingToast();
                }
            });
        }

        // ================================================================
        //  LOGOUT HANDLER
        // ================================================================
        logoutBtn.addEventListener('click', async () => {
            stopRing();
            hideRingToast();
            if (updateInterval) clearInterval(updateInterval);
            if (locationWatchId) navigator.geolocation.clearWatch(locationWatchId);
            await signOut(auth);
            window.location.href = 'index.html';
        });

        // ================================================================
        //  LOAD DEVICE DATA & CHECK STATUS
        // ================================================================
        async function loadDeviceData() {
            if (!currentUid) return;

            const userRef = ref(database, 'users/' + currentUid);

            try {
                const snap = await get(userRef);

                if (snap.exists()) {
                    const data = snap.val();
                    const registeredId = data.registeredDeviceId || null;
                    registeredDeviceId = registeredId;

                    // ---- 1. Determine device status ----
                    if (registeredId && currentDeviceId && registeredId === currentDeviceId) {
                        isRegisteredDevice = true;
                        statusEl.className = 'ui-status registered';
                        statusText.textContent = '✓ Logged in on registered device';
                        trackBtn.classList.add('hidden');
                        ringBtn.classList.add('hidden');
                        killBtn.classList.add('hidden');
                    } else if (registeredId) {
                        isRegisteredDevice = false;
                        statusEl.className = 'ui-status unregistered';
                        statusText.textContent = '⚠ Logged in on unregistered device';
                        trackBtn.classList.remove('hidden');
                        ringBtn.classList.remove('hidden');
                        killBtn.classList.remove('hidden');
                    } else {
                        isRegisteredDevice = false;
                        statusEl.className = 'ui-status unregistered';
                        statusText.textContent = '⚠ No registered device found';
                        trackBtn.classList.add('hidden');
                        ringBtn.classList.add('hidden');
                        killBtn.classList.add('hidden');
                    }

                    // ---- 2. Render device details ----
                    if (data.deviceInfo) {
                        renderDeviceDetails(data.deviceInfo);
                        noDeviceMsg.classList.add('hidden');
                        deviceGrid.classList.remove('hidden');
                    } else {
                        noDeviceMsg.classList.remove('hidden');
                        deviceGrid.innerHTML = '';
                    }

                    // ---- 3. Phone location (from Firebase) ----
                    const phoneLoc = data.phoneLocation || { lat: 0, lon: 0 };
                    updatePhoneMarker(phoneLoc.lat, phoneLoc.lon);

                    // ---- 4. Current device location ----
                    if (lastKnownLat && lastKnownLon) {
                        updateCurrentMarker(lastKnownLat, lastKnownLon);
                    }

                    // ---- 5. Setup device reference for updates ----
                    if (registeredId) {
                        deviceDataRef = ref(database, 'users/' + currentUid + '/registeredDevices/' + registeredId);
                    }

                } else {
                    noDeviceMsg.classList.remove('hidden');
                    deviceGrid.innerHTML = '';
                    statusEl.className = 'ui-status unregistered';
                    statusText.textContent = '⚠ No device data found';
                    trackBtn.classList.add('hidden');
                    ringBtn.classList.add('hidden');
                    killBtn.classList.add('hidden');
                }

            } catch (err) {
                console.error('Error loading device data:', err);
                statusEl.className = 'ui-status unregistered';
                statusText.textContent = '⚠ Error loading device data';
                trackBtn.classList.add('hidden');
                ringBtn.classList.add('hidden');
                killBtn.classList.add('hidden');
            }
        }

        // ================================================================
        //  RENDER DEVICE DETAILS
        // ================================================================
        function renderDeviceDetails(details) {
            deviceGrid.innerHTML = '';
            if (!details || Object.keys(details).length === 0) {
                deviceGrid.innerHTML =
                    '<div style="grid-column:1/-1;text-align:center;color:#666;font-size:0.6rem;">No device details available</div>';
                return;
            }
            for (const [key, value] of Object.entries(details)) {
                const card = document.createElement('div');
                card.className = 'device-card';
                card.innerHTML = `<span class="c-label">${key}</span><span class="c-value">${value || 'N/A'}</span>`;
                deviceGrid.appendChild(card);
            }
        }

        // ================================================================
        //  MAP INITIALIZATION
        // ================================================================
        function initMap(lat, lon) {
            if (map) return;
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([lat || 0, lon || 0], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: ''
            }).addTo(map);
            if (lat && lon) updatePhoneMarker(lat, lon);

            // Add a scale control to show meters
            L.control.scale({ position: 'bottomright', metric: true, imperial: false }).addTo(map);
        }

        // ================================================================
        //  PROFESSIONAL ICONS (SVG)
        // ================================================================
        function createPhoneIcon() {
            return L.divIcon({
                className: 'custom-phone-icon',
                html: `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="5" y="2" width="14" height="20" rx="3" stroke="#00e5ff" stroke-width="2" fill="rgba(0,229,255,0.15)"/>
                        <rect x="9" y="18" width="6" height="2" rx="1" fill="#00e5ff"/>
                        <path d="M15 6L9 6" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M15 8L9 8" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>`,
                iconSize: [28, 28],
                iconAnchor: [14, 28]
            });
        }

        function createLocationIcon() {
            return L.divIcon({
                className: 'custom-location-icon',
                html: `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="#ffcc00" stroke-width="2" fill="rgba(255,200,0,0.15)"/>
                        <circle cx="12" cy="9" r="3" stroke="#ffcc00" stroke-width="1.5" fill="rgba(255,200,0,0.25)"/>
                    </svg>`,
                iconSize: [28, 28],
                iconAnchor: [14, 28]
            });
        }

        // ================================================================
        //  UPDATE PHONE MARKER (📱) with pulsing blue circle (REDUCED radius)
        // ================================================================
        function updatePhoneMarker(lat, lon) {
            if (!map) {
                initMap(lat, lon);
                return;
            }
            if (phoneMarker) {
                phoneMarker.setLatLng([lat, lon]);
                if (pulseCircle) {
                    pulseCircle.setLatLng([lat, lon]);
                }
            } else {
                const icon = createPhoneIcon();
                phoneMarker = L.marker([lat, lon], { icon }).addTo(map)
                    .bindPopup('<b>Registered Device</b><br>Phone location');

                // ---- Create pulsing blue circle (50% opacity, REDUCED radius 50m) ----
                pulseCircle = L.circle([lat, lon], {
                    radius: 50, // Reduced from 200 to 50
                    color: '#00e5ff',
                    fillColor: '#00e5ff',
                    fillOpacity: 0.5,
                    opacity: 0.4,
                    weight: 2,
                    className: 'pulse-circle'
                }).addTo(map);

                // ---- Animate pulse ----
                let pulsePhase = 0;
                setInterval(() => {
                    if (pulseCircle) {
                        pulsePhase += 0.02;
                        const scale = 1 + 0.15 * Math.sin(pulsePhase);
                        const currentRadius = 50 * scale; // Base radius 50
                        const currentOpacity = 0.3 + 0.2 * Math.sin(pulsePhase + 0.5);
                        pulseCircle.setRadius(currentRadius);
                        pulseCircle.setStyle({ fillOpacity: currentOpacity });
                    }
                }, 100);
            }

            // ---- Zoom to show both points ----
            if (currentMarker) {
                const cur = currentMarker.getLatLng();
                const bounds = L.latLngBounds([cur.lat, cur.lng], [lat, lon]);
                map.fitBounds(bounds, { padding: [40, 40], maxZoom: 18 });
            } else {
                map.setView([lat, lon], 14, { animate: true });
            }
        }

        // ================================================================
        //  UPDATE CURRENT MARKER (📍)
        // ================================================================
        function updateCurrentMarker(lat, lon) {
            if (!map) {
                initMap(lat, lon);
                return;
            }
            if (currentMarker) {
                currentMarker.setLatLng([lat, lon]);
            } else {
                const icon = createLocationIcon();
                currentMarker = L.marker([lat, lon], { icon }).addTo(map)
                    .bindPopup('<b>Your Device</b><br>Current location');
            }
            if (phoneMarker) {
                const phone = phoneMarker.getLatLng();
                const bounds = L.latLngBounds([lat, lon], [phone.lat, phone.lng]);
                map.fitBounds(bounds, { padding: [40, 40], maxZoom: 18 });
            } else {
                map.setView([lat, lon], 14, { animate: true });
            }
        }

        // ================================================================
        //  GET LOCATIONS
        // ================================================================
        function getPhoneLocation() {
            if (!phoneMarker) return null;
            const p = phoneMarker.getLatLng();
            return { lat: p.lat, lon: p.lng };
        }

        function getCurrentLocation() {
            if (currentMarker) {
                const p = currentMarker.getLatLng();
                return { lat: p.lat, lon: p.lng };
            }
            if (lastKnownLat && lastKnownLon) {
                return { lat: lastKnownLat, lon: lastKnownLon };
            }
            return null;
        }

        // ================================================================
        //  TRACK DEVICE — draws route + zooms to 50 meters
        // ================================================================
        trackBtn.addEventListener('click', async () => {
            if (!map) {
                alert('Map is not ready yet.');
                return;
            }

            const phoneLoc = getPhoneLocation();
            const currentLoc = getCurrentLocation();

            if (!phoneLoc || !currentLoc) {
                alert('Missing location data for either the registered device or your current device.');
                return;
            }

            // Clear any existing route
            if (routingControl) {
                map.removeControl(routingControl);
                routingControl = null;
            }

            // ---- Zoom to ~50 meters (zoom level 18) ----
            const bounds = L.latLngBounds([currentLoc.lat, currentLoc.lon], [phoneLoc.lat, phoneLoc.lon]);
            map.fitBounds(bounds, { padding: [20, 20], maxZoom: 18 });

            // ---- Draw route ----
            const waypoints = [
                L.latLng(currentLoc.lat, currentLoc.lon),
                L.latLng(phoneLoc.lat, phoneLoc.lon)
            ];

            try {
                routingControl = L.Routing.control({
                    waypoints: waypoints,
                    lineOptions: {
                        styles: [{ color: '#00e5ff', weight: 3, opacity: 0.8 }]
                    },
                    showAlternatives: false,
                    fitSelectedRoutes: false,
                    router: L.Routing.osrmv1({
                        serviceUrl: 'https://routing.openstreetmap.de/routed-foot/route/v1'
                    }),
                    createMarker: function(i, waypoint, n) {
                        return null;
                    }
                }).addTo(map);

                routingControl.on('routingerror', function(e) {
                    console.warn('Routing error:', e.error);
                });

            } catch (err) {
                console.warn('Error creating routing control:', err);
            }
        });

        // ================================================================
        //  RING DEVICE — sets ring command (registered device rings)
        // ================================================================
        ringBtn.addEventListener('click', () => {
            if (!currentUid) return;
            // Set ring command to true — registered device will start ringing
            const ringRef = ref(database, 'users/' + currentUid + '/ringCommand');
            set(ringRef, true).catch(() => {});
            // Show toast on unregistered device
            showRingToast();
            // Auto-hide toast after 5 seconds
            setTimeout(() => {
                hideRingToast();
            }, 5000);
        });

        // ================================================================
        //  RING FUNCTIONS (registered device)
        // ================================================================
        function startRing() {
            if (isRinging) return;
            isRinging = true;

            // ---- Show modal on registered device ----
            ringModal.classList.add('active');
            stopRingBtn.classList.remove('hidden');

            // ---- Play ringtone ----
            try {
                ringAudioContext = new(window.AudioContext || window.webkitAudioContext)();

                // Ringtone pattern: 0.4 sec on, 0.2 sec off
                let noteIndex = 0;
                const frequencies = [800, 1000, 800, 1000, 800, 1000, 900, 1100];

                ringInterval = setInterval(() => {
                    if (!ringAudioContext) {
                        stopRing();
                        return;
                    }

                    try {
                        const osc = ringAudioContext.createOscillator();
                        const gain = ringAudioContext.createGain();
                        const now = ringAudioContext.currentTime;

                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(frequencies[noteIndex % frequencies.length], now);
                        gain.gain.setValueAtTime(0.3, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);

                        osc.connect(gain);
                        gain.connect(ringAudioContext.destination);
                        osc.start(now);
                        osc.stop(now + 0.35);

                        noteIndex++;

                    } catch (_) { /* silent */ }
                }, 400);

            } catch (err) {
                console.error('Ring error:', err);
                alert('Could not play ringtone. Audio context may be blocked.');
                stopRing();
            }
        }

        function stopRing() {
            isRinging = false;

            // ---- Hide modal ----
            ringModal.classList.remove('active');
            stopRingBtn.classList.add('hidden');

            // ---- Stop audio ----
            if (ringInterval) {
                clearInterval(ringInterval);
                ringInterval = null;
            }
            if (ringAudioContext) {
                try {
                    ringAudioContext.close();
                } catch (_) {}
                ringAudioContext = null;
            }

            // ---- Reset ring command in Firebase ----
            if (currentUid) {
                const ringRef = ref(database, 'users/' + currentUid + '/ringCommand');
                set(ringRef, false).catch(() => {});
            }
        }

        // ---- Stop ring from modal button ----
        stopRingBtn.addEventListener('click', stopRing);

        // ---- Close modal on backdrop click ----
        ringModal.addEventListener('click', (e) => {
            if (e.target === ringModal) {
                stopRing();
            }
        });

        // ================================================================
        //  TOAST FUNCTIONS (unregistered device)
        // ================================================================
        function showRingToast() {
            ringToast.classList.add('active');
        }

        function hideRingToast() {
            ringToast.classList.remove('active');
        }

        // ================================================================
        //  KILL SWITCH — erases registered device's data
        // ================================================================
        killBtn.addEventListener('click', async () => {
            if (!currentUid || !registeredDeviceId) {
                alert('No registered device to erase.');
                return;
            }

            const confirmMsg = '⚠️ DANGER: This will permanently erase the registered device data from The Reaper.\n\n' +
                'This includes:\n' +
                '• Device registration\n' +
                '• Location history\n' +
                '• All device data\n\n' +
                'This action cannot be undone. Are you sure?';

            if (!confirm(confirmMsg)) return;

            const doubleConfirm = 'FINAL WARNING: Type "ERASE" to confirm.';
            if (prompt(doubleConfirm) !== 'ERASE') {
                alert('Kill switch cancelled.');
                return;
            }

            try {
                // Stop ring if playing
                stopRing();

                // Delete the registered device's data from Firebase
                const deviceRef = ref(database, 'users/' + currentUid + '/registeredDevices/' + registeredDeviceId);
                await remove(deviceRef);

                // Also delete phoneLocation if it exists
                const phoneLocRef = ref(database, 'users/' + currentUid + '/phoneLocation');
                await remove(phoneLocRef).catch(() => {});

                // Clear local storage of device ID (unregistered device still has its own ID)
                // But we keep the logged-in session

                // Clear map markers
                if (phoneMarker) {
                    map.removeLayer(phoneMarker);
                    phoneMarker = null;
                }
                if (pulseCircle) {
                    map.removeLayer(pulseCircle);
                    pulseCircle = null;
                }
                if (routingControl) {
                    map.removeControl(routingControl);
                    routingControl = null;
                }

                // Clear UI
                deviceGrid.innerHTML = '';
                noDeviceMsg.classList.remove('hidden');
                statusEl.className = 'ui-status unregistered';
                statusText.textContent = '⚠ Registered device data erased';

                trackBtn.classList.add('hidden');
                ringBtn.classList.add('hidden');
                killBtn.classList.add('hidden');

                alert('✅ Registered device data has been erased from The Reaper.');

                // Log out after kill
                await signOut(auth);
                window.location.href = 'index.html';

            } catch (err) {
                console.error('Kill switch error:', err);
                alert('Error erasing data. Please try again.');
            }
        });

        // ================================================================
        //  LOCATION WATCH — tracks current device position
        // ================================================================
        function startLocationWatch() {
            if (!navigator.geolocation) return;
            if (locationWatchId) navigator.geolocation.clearWatch(locationWatchId);

            locationWatchId = navigator.geolocation.watchPosition(
                (pos) => {
                    lastKnownLat = pos.coords.latitude;
                    lastKnownLon = pos.coords.longitude;

                    // Update the current marker with ACCURATE position
                    if (currentMarker) {
                        currentMarker.setLatLng([lastKnownLat, lastKnownLon]);
                    } else {
                        const icon = createLocationIcon();
                        currentMarker = L.marker([lastKnownLat, lastKnownLon], { icon }).addTo(map)
                            .bindPopup('<b>Your Device</b><br>Current location');
                    }

                    // Zoom to show both devices if phone marker exists
                    if (phoneMarker) {
                        const phone = phoneMarker.getLatLng();
                        const bounds = L.latLngBounds([lastKnownLat, lastKnownLon], [phone.lat, phone.lng]);
                        map.fitBounds(bounds, { padding: [40, 40], maxZoom: 18 });
                    } else {
                        map.setView([lastKnownLat, lastKnownLon], 14, { animate: true });
                    }

                    // If this is the registered device, update phoneLocation in Firebase
                    if (isRegisteredDevice && currentUid && registeredDeviceId) {
                        const locRef = ref(database, 'users/' + currentUid + '/registeredDevices/' + registeredDeviceId +
                            '/phoneLocation');
                        set(locRef, {
                            lat: lastKnownLat,
                            lon: lastKnownLon,
                            timestamp: new Date().toISOString()
                        }).catch(() => {});
                    }

                    // Always save current location for other devices to see
                    if (currentUid) {
                        const curRef = ref(database, 'users/' + currentUid + '/currentLocation');
                        set(curRef, {
                            lat: lastKnownLat,
                            lon: lastKnownLon,
                            timestamp: new Date().toISOString()
                        }).catch(() => {});
                    }
                },
                (err) => {
                    console.warn('Location error:', err.message);
                }, {
                    enableHighAccuracy: true,
                    maximumAge: 2000,
                    timeout: 8000
                }
            );
        }

        // ================================================================
        //  PERIODIC UPDATES — every 10 seconds
        // ================================================================
        function startPeriodicUpdates() {
            if (updateInterval) clearInterval(updateInterval);

            updateInterval = setInterval(async () => {
                if (!currentUid || !registeredDeviceId) return;

                // Update user's lastSeen
                try {
                    const userRef = ref(database, 'users/' + currentUid);
                    await update(userRef, { lastSeen: new Date().toISOString() });
                } catch (_) {}

                // If this is the registered device, also update device details
                if (isRegisteredDevice && deviceDataRef) {
                    try {
                        const details = collectDeviceInfo();
                        await update(deviceDataRef, {
                            deviceDetails: details,
                            lastUpdated: new Date().toISOString()
                        });
                    } catch (_) {}
                }
            }, 10000);
        }

        // ================================================================
        //  COLLECT DEVICE INFO (for periodic updates)
        // ================================================================
        function collectDeviceInfo() {
            const ua = navigator.userAgent;
            let browserName = 'Unknown';
            if (ua.indexOf('Firefox') > -1) browserName = 'Firefox';
            else if (ua.indexOf('Chrome') > -1 && ua.indexOf('Edg') === -1) browserName = 'Chrome';
            else if (ua.indexOf('Safari') > -1 && ua.indexOf('Chrome') === -1) browserName = 'Safari';
            else if (ua.indexOf('Edg') > -1) browserName = 'Edge';

            let os = 'Unknown';
            if (ua.indexOf('Windows') > -1) os = 'Windows';
            else if (ua.indexOf('Android') > -1) os = 'Android';
            else if (ua.indexOf('iPhone') > -1 || ua.indexOf('iPad') > -1) os = 'iOS';
            else if (ua.indexOf('Mac') > -1) os = 'macOS';
            else if (ua.indexOf('Linux') > -1) os = 'Linux';

            let deviceType = 'Desktop';
            if (/Mobi|Android|iPhone|iPad|iPod/i.test(ua)) deviceType = /Tablet/i.test(ua) ? 'Tablet' : 'Mobile';

            const screenInfo = `${screen.width} x ${screen.height}`;
            const pixelDensity = window.devicePixelRatio;
            const cpuCores = navigator.hardwareConcurrency || 'Unknown';
            const deviceMemory = navigator.deviceMemory || 'Unknown';

            return {
                'Device Type': deviceType,
                'Operating System': os,
                'Browser': browserName,
                'Screen Res': screenInfo,
                'Pixel Density': pixelDensity.toFixed(2),
                'CPU Cores': cpuCores,
                'RAM (GB)': deviceMemory
            };
        }

        // ================================================================
        //  INIT MAP ON DOM LOAD
        // ================================================================
        document.addEventListener('DOMContentLoaded', () => {
            initMap(0, 0);
        });

        // ================================================================
        //  HANDLE WINDOW RESIZE
        // ================================================================
        window.addEventListener('resize', () => {
            if (map) map.invalidateSize();
        });

        // ================================================================
        //  LOG STARTUP
        // ================================================================
        console.log('🔮 The Reaper · Tracking Dashboard initialized');
    </script>
