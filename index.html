<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>The Reaper · floating</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ---------- RESET ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
        }

        /* ---------- BACKGROUND ---------- */
        html,
        body {
            width: 100%;
            min-height: 100vh;
            background: #000000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px 16px;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 229, 255, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.035) 1px, transparent 1px);
            background-size: clamp(30px, 5vw, 60px) clamp(30px, 5vw, 60px);
            z-index: -1;
            pointer-events: none;
        }

        /* ---------- FLOATING ROOT ---------- */
        .floating-root {
            width: 100%;
            max-width: 780px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(12px, 2.5vh, 28px);
            padding: 10px 0;
            position: relative;
        }

        /* ---------- LOGO ---------- */
        .logo-mega {
            text-align: center;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .logo-mega img {
            width: auto;
            height: clamp(360px, 70vw, 1200px);
            max-height: 80vh;
            mix-blend-mode: screen;
            display: block;
            margin: 0 auto;
            transition: transform 0.5s ease;
            filter: none !important;
            object-fit: contain;
            pointer-events: none;
        }
        .logo-mega img:hover {
            transform: scale(1.02);
        }

        /* ---------- TYPOGRAPHY ---------- */
        .floating-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 6vw, 3.8rem);
            text-align: center;
            background: linear-gradient(90deg, #00e5ff, #0077ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.04em;
            line-height: 1.1;
            margin: 0;
            font-weight: 900;
        }
        .floating-sub {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.7rem, 1.6vw, 1.1rem);
            text-align: center;
            color: #666;
            -webkit-text-fill-color: #777;
            letter-spacing: 0.3em;
            font-weight: 400;
            margin: -4px 0 0 0;
        }

        /* ---------- FLOATING FIELDS ---------- */
        .float-field {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
        }
        .float-field .field-label {
            display: block;
            color: #888;
            font-size: clamp(0.6rem, 0.9vw, 0.7rem);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2px;
            font-weight: 600;
            padding-left: 2px;
        }
        .float-field .field-input {
            width: 100%;
            padding: clamp(8px, 1.2vw, 14px) clamp(10px, 1.6vw, 18px);
            background: rgba(255, 255, 255, 0.03);
            border: none;
            border-bottom: 1px solid rgba(0, 229, 255, 0.25);
            color: #fff;
            font-size: clamp(0.9rem, 1.3vw, 1.2rem);
            outline: none;
            transition: border-color 0.3s, background 0.3s;
            border-radius: 0;
            font-weight: 400;
            letter-spacing: 0.3px;
        }
        .float-field .field-input:focus {
            border-bottom-color: #00e5ff;
            background: rgba(255, 255, 255, 0.06);
        }
        .float-field .field-input::placeholder {
            color: #333;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* ---------- FLOATING BUTTONS ---------- */
        .float-btn {
            width: 100%;
            max-width: 480px;
            padding: clamp(10px, 1.4vh, 16px);
            background: transparent;
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: #00e5ff;
            font-weight: 700;
            font-size: clamp(0.8rem, 1.1vw, 1rem);
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 auto;
            backdrop-filter: blur(2px);
        }
        .float-btn:hover {
            background: rgba(0, 229, 255, 0.12);
            border-color: #00e5ff;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.15);
        }
        .float-btn:active {
            transform: scale(0.97);
        }

        /* ---------- FLOATING LINK ---------- */
        .float-link {
            text-align: center;
            color: #555;
            font-size: clamp(0.75rem, 1vw, 0.85rem);
            margin-top: 2px;
        }
        .float-link a {
            color: #00e5ff;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 1px solid transparent;
            transition: border 0.3s, color 0.3s;
        }
        .float-link a:hover {
            border-bottom-color: #00e5ff;
            color: #66f0ff;
        }

        /* ---------- DEVICE GRID ---------- */
        .float-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(140px, 44%), 1fr));
            gap: clamp(5px, 0.8vw, 10px);
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            max-height: clamp(180px, 36vh, 300px);
            overflow-y: auto;
            padding-right: 4px;
        }
        .float-grid::-webkit-scrollbar {
            width: 3px;
        }
        .float-grid::-webkit-scrollbar-track {
            background: transparent;
        }
        .float-grid::-webkit-scrollbar-thumb {
            background: #00e5ff;
            border-radius: 10px;
        }
        .float-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 229, 255, 0.08);
            padding: clamp(6px, 0.8vw, 12px);
            border-radius: 6px;
            font-size: clamp(0.55rem, 0.8vw, 0.7rem);
            word-break: break-word;
            backdrop-filter: blur(1px);
        }
        .float-card .c-label {
            color: #00e5ff;
            font-weight: 600;
            display: block;
            font-size: clamp(0.5rem, 0.7vw, 0.6rem);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 1px;
        }
        .float-card .c-value {
            color: #ccc;
            word-break: break-word;
            font-size: clamp(0.55rem, 0.8vw, 0.75rem);
        }

        /* ---------- SCANNER ---------- */
        .scanner-float {
            width: 100%;
            max-width: 480px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00e5ff, transparent);
            position: relative;
            animation: scanFloat 2s infinite linear;
            margin: 4px auto 2px;
            opacity: 0.6;
        }
        @keyframes scanFloat {
            0% {
                top: 0;
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                top: 100%;
                opacity: 0;
            }
        }

        /* ---------- IP DISPLAY ---------- */
        .float-ip {
            background: rgba(255, 255, 255, 0.02);
            padding: clamp(6px, 0.8vw, 10px);
            border-radius: 4px;
            text-align: center;
            color: #888;
            font-size: clamp(0.7rem, 0.9vw, 0.8rem);
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(1px);
        }
        .float-ip span {
            color: #00e5ff;
            font-weight: 500;
        }

        /* ---------- TWO-COLUMN ROW ---------- */
        .float-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(8px, 1.2vw, 16px);
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }
        .float-row .float-field {
            max-width: 100%;
            margin: 0;
        }

        /* ---------- MODAL ---------- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
        }
        .modal-box {
            background: rgba(10, 10, 10, 0.92);
            border: 1px solid rgba(0, 229, 255, 0.2);
            padding: clamp(20px, 4vw, 38px);
            max-width: 94%;
            width: 440px;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 0 60px rgba(0, 229, 255, 0.08);
            backdrop-filter: blur(8px);
        }
        .modal-box p {
            margin: 12px 0;
            color: #ccc;
            font-size: clamp(0.8rem, 1vw, 0.95rem);
        }
        .modal-buttons {
            display: flex;
            gap: clamp(10px, 2vw, 16px);
            justify-content: center;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .modal-btn {
            padding: clamp(8px, 1.2vw, 12px) clamp(16px, 2.5vw, 26px);
            border-radius: 6px;
            font-size: clamp(0.7rem, 0.9vw, 0.8rem);
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            min-width: 90px;
            letter-spacing: 1px;
        }
        .modal-btn.confirm {
            background: #00e5ff;
            color: #000;
        }
        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.06);
            color: #888;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .modal-btn.confirm:hover {
            background: #66f0ff;
        }
        .modal-btn.cancel:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .hidden {
            display: none !important;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 480px) {
            .float-row {
                grid-template-columns: 1fr;
                gap: 6px;
            }
            .float-grid {
                grid-template-columns: 1fr 1fr;
                max-height: 160px;
            }
            .logo-mega img {
                height: clamp(260px, 55vw, 400px);
            }
        }
        @media (max-width: 380px) {
            .float-grid {
                grid-template-columns: 1fr;
            }
            .logo-mega img {
                height: clamp(200px, 50vw, 300px);
            }
        }
        @media (min-width: 1200px) {
            .logo-mega img {
                height: 1100px;
            }
            .floating-root {
                max-width: 960px;
            }
        }

        /* ---------- PAGE SECTIONS ---------- */
        .page-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: clamp(8px, 1.6vh, 18px);
        }
        .page-section .float-field {
            max-width: 480px;
        }
    </style>
</head>
<body>

    <!-- ===== FLOATING ROOT ===== -->
    <div class="floating-root" id="app">

        <!-- ===== PAGE 1 : LOGIN ===== -->
        <div id="page-login" class="page-section">
            <div class="logo-mega">
                <img src="reaper.png" alt="The Reaper" />
            </div>
            <div class="floating-title">THE REAPER</div>
            <div class="floating-sub">Tech Tracking System</div>

            <div class="float-field">
                <span class="field-label">Email</span>
                <input type="email" id="login-email" class="field-input" placeholder="reaper@cybertech.com" />
            </div>
            <div class="float-field">
                <span class="field-label">Password</span>
                <input type="password" id="login-pass" class="field-input" placeholder="••••••••" />
            </div>

            <button class="float-btn" id="login-btn">SECURE LOGIN</button>

            <div class="float-link">
                <a id="create-account-btn">CREATE ACCOUNT</a>
            </div>
        </div>

        <!-- ===== PAGE 2 : DEVICE SCAN ===== -->
        <div id="page-scan" class="page-section hidden">
            <div class="logo-mega" style="margin-bottom:-6px;">
                <img src="reaper.png" style="height:clamp(180px, 35vw, 500px);" alt="The Reaper" />
            </div>
            <div class="floating-title" style="font-size:clamp(1.2rem, 3vw, 2.2rem);">DEVICE SCAN</div>
            <div class="floating-sub" style="color:#00e5ff; -webkit-text-fill-color:#b0f0ff; font-weight:500;">Extracting all technical data …</div>
            <div class="scanner-float"></div>

            <div class="float-grid" id="device-grid"></div>

            <div class="float-row">
                <div class="float-field" style="margin:0;">
                    <span class="field-label">IP Address</span>
                    <div class="float-ip" id="ip-display">Fetching …</div>
                </div>
                <div class="float-field" style="margin:0;">
                    <span class="field-label">Status</span>
                    <div class="float-ip" style="color:#00e5ff;">Ready</div>
                </div>
            </div>

            <button class="float-btn" id="proceed-register-btn" style="margin-top:2px;">PROCEED TO REGISTER</button>
        </div>

        <!-- ===== PAGE 3 : REGISTRATION ===== -->
        <div id="page-register" class="page-section hidden">
            <div class="logo-mega" style="margin-bottom:-6px;">
                <img src="reaper.png" style="height:clamp(180px, 35vw, 500px);" alt="The Reaper" />
            </div>
            <div class="floating-title" style="font-size:clamp(1.2rem, 3vw, 2.2rem);">REGISTRATION</div>
            <div class="floating-sub" style="color:#00e5ff; -webkit-text-fill-color:#b0f0ff; font-weight:500;">Secure your device with The Reaper</div>

            <div class="float-field">
                <span class="field-label">Full Name</span>
                <input type="text" id="reg-name" class="field-input" placeholder="John Doe" />
            </div>
            <div class="float-field">
                <span class="field-label">Email</span>
                <input type="email" id="reg-email" class="field-input" placeholder="john@email.com" />
            </div>
            <div class="float-field">
                <span class="field-label">Phone</span>
                <input type="tel" id="reg-phone" class="field-input" placeholder="+1 555 000 000" />
            </div>
            <div class="float-field">
                <span class="field-label">Emergency Phone</span>
                <input type="tel" id="reg-emergency-phone" class="field-input" placeholder="Emergency contact" />
            </div>
            <div class="float-field">
                <span class="field-label">Emergency Email</span>
                <input type="email" id="reg-emergency-email" class="field-input" placeholder="emergency@email.com" />
            </div>
            <div class="float-field">
                <span class="field-label">Password</span>
                <input type="password" id="reg-pass" class="field-input" placeholder="Create a strong password" />
            </div>

            <button class="float-btn" id="register-btn">CREATE ACCOUNT</button>
        </div>
    </div>

    <!-- ===== CONFIRMATION MODAL ===== -->
    <div id="confirmation-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div style="font-family:'Orbitron'; font-size:clamp(1.1rem, 2.5vw, 1.6rem); color:#00e5ff; margin-bottom:4px;">CONFIRM</div>
            <div id="modal-content">
                <p>Verifying your details …</p>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="modal-cancel">CANCEL</button>
                <button class="modal-btn confirm" id="modal-confirm">REGISTER DEVICE</button>
            </div>
        </div>
    </div>

    <!-- ===== FIREBASE + APP ===== -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js"
            }
        }
    </script>

    <script type="module">
        // ============================================================
        //  MODULE IMPORTS
        // ============================================================
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, set } from "firebase/database";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "firebase/auth";

        // ============================================================
        //  FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDye0P37QYNjtRRKh2_At84QCkKCqjceAQ",
            authDomain: "reaper-7b33d.firebaseapp.com",
            databaseURL: "https://reaper-7b33d-default-rtdb.firebaseio.com",
            projectId: "reaper-7b33d",
            storageBucket: "reaper-7b33d.firebasestorage.app",
            messagingSenderId: "1023523985110",
            appId: "1:1023523985110:web:889e2200fad1fa5b98db77",
            measurementId: "G-NQ8F9TKPVZ"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);

        // ============================================================
        //  GLOBAL STATE
        // ============================================================
        let collectedDeviceData = {};
        let registrationData = {};
        let publicIP = "Unknown";

        // ============================================================
        //  HELPER: SHOW PAGE
        // ============================================================
        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // ============================================================
        //  HELPER: GENERATE UNIQUE DEVICE ID
        // ============================================================
        function generateDeviceId() {
            const parts = [
                navigator.userAgent,
                navigator.hardwareConcurrency || '0',
                navigator.deviceMemory || '0',
                screen.width,
                screen.height,
                navigator.language || 'en'
            ];
            let hash = 0;
            const str = parts.join('||');
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return 'device_' + Math.abs(hash).toString(16) + '_' + Date.now().toString(36);
        }

        // ============================================================
        //  LOGIN HANDLER
        // ============================================================
        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value.trim();

            if (!email || !pass) {
                alert('Please fill in both email and password.');
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = 'reaper.html';
            } catch (error) {
                console.error('Login error:', error);
                let msg = 'Login failed. ';
                if (error.code === 'auth/user-not-found') msg += 'No account found with this email.';
                else if (error.code === 'auth/wrong-password') msg += 'Incorrect password.';
                else if (error.code === 'auth/invalid-email') msg += 'Invalid email address.';
                else msg += error.message;
                alert(msg);
            }
        });

        // ============================================================
        //  CREATE ACCOUNT → SCAN
        // ============================================================
        document.getElementById('create-account-btn').addEventListener('click', () => {
            showPage('page-scan');
            const grid = document.getElementById('device-grid');
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center;color:#00e5ff;font-weight:500;padding:6px;">Initializing deep system scan …</div>';
            setTimeout(() => collectDeviceInfo(), 350);
        });

        // ============================================================
        //  COLLECT DEVICE INFO
        // ============================================================
        async function collectDeviceInfo() {
            const ua = navigator.userAgent;
            let browserName = 'Unknown';
            if (ua.indexOf('Firefox') > -1) browserName = 'Firefox';
            else if (ua.indexOf('Chrome') > -1 && ua.indexOf('Edg') === -1) browserName = 'Chrome';
            else if (ua.indexOf('Safari') > -1 && ua.indexOf('Chrome') === -1) browserName = 'Safari';
            else if (ua.indexOf('Edg') > -1) browserName = 'Edge';

            let os = 'Unknown';
            if (ua.indexOf('Windows') > -1) os = 'Windows';
            else if (ua.indexOf('Android') > -1) os = 'Android';
            else if (ua.indexOf('iPhone') > -1 || ua.indexOf('iPad') > -1) os = 'iOS';
            else if (ua.indexOf('Mac') > -1) os = 'macOS';
            else if (ua.indexOf('Linux') > -1) os = 'Linux';

            let deviceType = 'Desktop';
            if (/Mobi|Android|iPhone|iPad|iPod/i.test(ua)) deviceType = /Tablet/i.test(ua) ? 'Tablet' : 'Mobile';

            const screenInfo = `${screen.width} x ${screen.height}`;
            const availScreen = `${screen.availWidth} x ${screen.availHeight}`;
            const pixelDensity = window.devicePixelRatio;
            const colorDepth = screen.colorDepth || 'N/A';
            const orientation = screen.orientation ? screen.orientation.type : 'N/A';
            const touchSupport = 'ontouchstart' in window || navigator.maxTouchPoints > 0 ? 'Yes' : 'No';
            const maxTouchPoints = navigator.maxTouchPoints || '0';
            const cpuCores = navigator.hardwareConcurrency || 'Unknown';
            const deviceMemory = navigator.deviceMemory || 'Unknown';
            const platform = navigator.platform || 'Unknown';
            const languages = navigator.languages ? navigator.languages.join(', ') : 'Unknown';
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Unknown';

            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            let netType = 'Unknown',
                downlink = 'Unknown',
                rtt = 'Unknown',
                saveData = 'Unknown';
            if (connection) {
                netType = connection.effectiveType || 'Unknown';
                downlink = connection.downlink || 'Unknown';
                rtt = connection.rtt || 'Unknown';
                saveData = connection.saveData || false;
            }

            let batteryLevel = 'N/A',
                batteryCharging = false;
            try {
                const battery = await navigator.getBattery();
                batteryLevel = (battery.level * 100).toFixed(0) + '%';
                batteryCharging = battery.charging;
            } catch (_) { batteryLevel = 'N/A'; }

            collectedDeviceData = {
                'Device Type': deviceType,
                'Operating System': os,
                'Browser': browserName,
                'Browser Version': ua.match(/(?:Chrome|Firefox|Edg|Safari)\/(\d+\.\d+)/)?.[1] || 'N/A',
                'OS Version': ua.match(/Windows NT (\d+\.\d+)/)?.[1] || ua.match(/Android (\d+)/)?.[1] || 'N/A',
                'Platform': platform,
                'Languages': languages,
                'Timezone': timezone,
                'Screen Res': screenInfo,
                'Available Res': availScreen,
                'Color Depth': colorDepth + ' bit',
                'Pixel Density': pixelDensity.toFixed(2),
                'Orientation': orientation,
                'Touch Support': touchSupport,
                'Max Touch Points': maxTouchPoints,
                'CPU Cores': cpuCores,
                'RAM Estimate (GB)': deviceMemory,
                'Connection Type': netType,
                'Downlink (Mbps)': downlink,
                'RTT (ms)': rtt,
                'Save Data': saveData,
                'Battery Level': batteryLevel,
                'Battery Charging': batteryCharging
            };

            renderDeviceInfo();
            getPublicIP();
        }

        function renderDeviceInfo() {
            const grid = document.getElementById('device-grid');
            grid.innerHTML = '';
            for (const [key, value] of Object.entries(collectedDeviceData)) {
                const card = document.createElement('div');
                card.className = 'float-card';
                card.innerHTML = `<span class="c-label">${key}</span><span class="c-value">${value}</span>`;
                grid.appendChild(card);
            }
        }

        async function getPublicIP() {
            try {
                const resp = await fetch('https://api.ipify.org?format=json');
                const data = await resp.json();
                publicIP = data.ip;
                document.getElementById('ip-display').innerHTML = `<span>${publicIP}</span>`;
            } catch (_) {
                document.getElementById('ip-display').innerHTML = 'Unable to fetch';
            }
        }

        // ============================================================
        //  PROCEED TO REGISTER
        // ============================================================
        document.getElementById('proceed-register-btn').addEventListener('click', () => {
            showPage('page-register');
        });

        // ============================================================
        //  REGISTRATION – CLICK
        // ============================================================
        document.getElementById('register-btn').addEventListener('click', () => {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const emergencyPhone = document.getElementById('reg-emergency-phone').value.trim();
            const emergencyEmail = document.getElementById('reg-emergency-email').value.trim();
            const pass = document.getElementById('reg-pass').value.trim();

            if (!name || !email || !phone || !pass) {
                alert('Please fill in all required fields (Name, Email, Phone, Password).');
                return;
            }

            registrationData = { name, email, phone, emergencyPhone, emergencyEmail, pass };

            const modal = document.getElementById('confirmation-modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <p>Final review. <span style="color:#00e5ff;">All data will be saved securely.</span></p>
                <div style="text-align:left; background:rgba(255,255,255,0.03); padding:clamp(10px,2vw,16px); border-radius:6px; border:1px solid rgba(255,255,255,0.05); font-size:clamp(0.7rem,0.9vw,0.8rem);">
                    <strong style="color:#00e5ff;">Name:</strong> ${name}<br>
                    <strong style="color:#00e5ff;">Email:</strong> ${email}<br>
                    <strong style="color:#00e5ff;">Phone:</strong> ${phone}<br>
                    <strong style="color:#00e5ff;">Emergency:</strong> ${emergencyPhone || 'N/A'}<br>
                    <strong style="color:#00e5ff;">Emergency Email:</strong> ${emergencyEmail || 'N/A'}
                </div>
            `;
            modal.classList.remove('hidden');
        });

        // ============================================================
        //  MODAL CONTROLS
        // ============================================================
        document.getElementById('modal-cancel').addEventListener('click', () => {
            document.getElementById('confirmation-modal').classList.add('hidden');
        });

        document.getElementById('modal-confirm').addEventListener('click', async () => {
            document.getElementById('confirmation-modal').classList.add('hidden');

            const { name, email, phone, emergencyPhone, emergencyEmail, pass } = registrationData;

            try {
                // ---- 1. Create Firebase Auth user ----
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const uid = userCredential.user.uid;

                // ---- 2. Generate a unique device ID ----
                const deviceId = generateDeviceId();

                // ---- 3. Store device ID in localStorage (for later comparison) ----
                localStorage.setItem('reaper_device_id', deviceId);

                // ---- 4. Build user data object ----
                const userData = {
                    profile: {
                        name,
                        email,
                        phone,
                        emergencyPhone: emergencyPhone || '',
                        emergencyEmail: emergencyEmail || ''
                    },
                    deviceInfo: collectedDeviceData,
                    network: { publicIP },
                    registeredDeviceId: deviceId,
                    timestamp: new Date().toISOString()
                };

                // ---- 5. Save to Firebase Realtime Database ----
                await set(ref(database, `users/${uid}`), userData);

                // ---- 6. Redirect to dashboard ----
                window.location.href = 'reaper.html';

            } catch (error) {
                console.error('Registration error:', error);
                let msg = 'Registration failed. ';
                if (error.code === 'auth/email-already-in-use') msg += 'This email is already registered.';
                else if (error.code === 'auth/weak-password') msg += 'Password is too weak.';
                else if (error.code === 'auth/invalid-email') msg += 'Invalid email address.';
                else msg += error.message;
                alert(msg);
            }
        });

        // ============================================================
        //  CLOSE MODAL ON OVERLAY CLICK
        // ============================================================
        document.getElementById('confirmation-modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                document.getElementById('confirmation-modal').classList.add('hidden');
            }
        });

        // ============================================================
        //  ENTER KEY SUPPORT
        // ============================================================
        document.getElementById('login-pass').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('login-btn').click();
        });
        document.getElementById('reg-pass').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('register-btn').click();
        });
    </script>

</body>
</html>
