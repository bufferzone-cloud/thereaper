<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Reaper - Tech Tracking</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
    body {
        background: #000000;
        color: #fff;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
    }
    body::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: 
            linear-gradient(rgba(0, 229, 255, 0.04) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 229, 255, 0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: -1;
    }

    .page-container {
        width: 100%;
        max-width: 580px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        position: relative;
    }

    .page {
        display: none;
        flex-direction: column;
        align-items: center;
        width: 100%;
        animation: fadeIn 0.5s ease;
    }
    .page.active { display: flex; }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* ===== LOGO BLENDING (Massive, deep black) ===== */
    .logo-mega {
        width: 65%;
        max-width: 280px;
        margin: 0 auto 15px;
        mix-blend-mode: screen; /* Blends logo into background */
        filter: drop-shadow(0 0 25px rgba(0, 229, 255, 0.15));
        display: block;
        transition: 0.3s ease;
    }
    .logo-mega:hover { transform: scale(1.03); }

    .reaper-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 2.8rem;
        background: linear-gradient(90deg, #00e5ff, #0077ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 5px;
        margin-bottom: 5px;
    }
    .reaper-sub {
        color: #666;
        letter-spacing: 8px;
        text-transform: uppercase;
        font-size: 0.8rem;
        margin-bottom: 20px;
    }

    /* ===== CARDS ===== */
    .card {
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(0, 229, 255, 0.12);
        border-radius: 16px;
        padding: 28px 25px;
        width: 100%;
        box-shadow: 0 0 30px rgba(0, 229, 255, 0.08);
    }

    .card-title {
        font-family: 'Orbitron', sans-serif;
        color: #00e5ff;
        text-align: center;
        letter-spacing: 3px;
        font-size: 1.2rem;
        margin-bottom: 15px;
        text-transform: uppercase;
    }

    /* ===== INPUTS ===== */
    .input-group { margin-bottom: 16px; text-align: left; }
    .input-group label {
        color: #aaa;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        display: block;
        margin-bottom: 4px;
    }
    .input-group input {
        width: 100%;
        padding: 12px 15px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        color: #fff;
        font-size: 1rem;
        outline: none;
        transition: 0.3s;
    }
    .input-group input:focus { border-color: #00e5ff; box-shadow: 0 0 15px rgba(0, 229, 255, 0.15); }

    /* ===== BUTTONS ===== */
    .btn-primary {
        width: 100%;
        padding: 14px;
        background: transparent;
        border: 1px solid #00e5ff;
        color: #00e5ff;
        font-weight: 700;
        font-size: 1rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 5px;
    }
    .btn-primary:hover {
        background: #00e5ff;
        color: #000;
        box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
    }
    .btn-secondary {
        background: rgba(0, 229, 255, 0.08);
        border: 1px solid rgba(0, 229, 255, 0.2);
    }
    .btn-secondary:hover {
        background: rgba(0, 229, 255, 0.2);
    }

    .bottom-link {
        text-align: center;
        margin-top: 15px;
        color: #888;
        font-size: 0.9rem;
    }
    .bottom-link a {
        color: #00e5ff;
        text-decoration: none;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }
    .bottom-link a:hover { text-shadow: 0 0 12px #00e5ff; }

    /* ===== DEVICE GRID ===== */
    .device-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        max-height: 320px;
        overflow-y: auto;
        padding-right: 5px;
        margin: 5px 0 15px;
    }
    .device-grid::-webkit-scrollbar { width: 5px; }
    .device-grid::-webkit-scrollbar-track { background: #111; }
    .device-grid::-webkit-scrollbar-thumb { background: #00e5ff; border-radius: 4px; }

    .device-item {
        background: rgba(255,255,255,0.03);
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .device-item .lbl { color: #00e5ff; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; }
    .device-item .val { color: #ddd; font-size: 0.85rem; font-weight: 400; }

    /* ===== SCAN LINE ===== */
    .scanner-bar {
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, transparent, #00e5ff, transparent);
        animation: scan 2s infinite linear;
        margin: 10px 0 15px;
    }
    @keyframes scan {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
    }

    /* ===== MODAL ===== */
    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.92);
        backdrop-filter: blur(6px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 999;
    }
    .modal-box {
        background: #0a0a0a;
        border: 1px solid #00e5ff;
        padding: 30px;
        max-width: 420px;
        width: 90%;
        border-radius: 16px;
        box-shadow: 0 0 50px rgba(0,229,255,0.1);
    }
    .modal-box h3 { font-family: 'Orbitron'; color: #00e5ff; margin-bottom: 12px; text-align: center; }
    .modal-box p { color: #ccc; margin-bottom: 12px; font-size: 0.9rem; }
    .modal-btns { display: flex; gap: 10px; margin-top: 15px; }
    .btn-modal { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
    .btn-confirm { background: #00e5ff; color: #000; }
    .btn-cancel { background: #333; color: #aaa; }

    .hidden { display: none !important; }
</style>
</head>
<body>

<div class="page-container">

    <!-- ===== PAGE 1: LOGIN ===== -->
    <div id="page-login" class="page active">
        <img src="reaper.png" alt="The Reaper" class="logo-mega">
        <div class="reaper-title">THE REAPER</div>
        <div class="reaper-sub">Tech Tracking System</div>

        <div class="card">
            <form id="loginForm" onsubmit="event.preventDefault(); performLogin();">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="reaper@cybertech.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-pass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">SECURE LOGIN</button>
            </form>
            <div class="bottom-link">
                No account? <a onclick="startCreateAccount()">Create Account</a>
            </div>
        </div>
    </div>

    <!-- ===== PAGE 2: DEVICE SCAN ===== -->
    <div id="page-scan" class="page">
        <img src="reaper.png" class="logo-mega" style="width:45%; max-width:150px; margin-bottom:5px;">
        <div class="reaper-title" style="font-size:1.8rem;">SCANNING</div>
        <div class="scanner-bar"></div>

        <div class="card">
            <div class="card-title" style="font-size:0.9rem; margin-bottom:5px;">🔍 Device Fingerprint</div>
            <div class="device-grid" id="device-grid">
                <div style="grid-column:1/-1; text-align:center; color:cyan; padding:15px;">Acquiring system data...</div>
            </div>
            <button class="btn-primary btn-secondary" onclick="proceedToRegister()">PROCEED TO REGISTER</button>
        </div>
    </div>

    <!-- ===== PAGE 3: REGISTRATION ===== -->
    <div id="page-register" class="page">
        <img src="reaper.png" class="logo-mega" style="width:40%; max-width:120px; margin-bottom:5px;">
        <div class="reaper-title" style="font-size:1.6rem;">REGISTER</div>

        <div class="card">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="John Doe" required>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="john@email.com" required>
            </div>
            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" id="reg-phone" placeholder="+1 555 000 000" required>
            </div>
            <div class="input-group">
                <label>Emergency Number</label>
                <input type="tel" id="reg-emergency-phone" placeholder="Emergency contact">
            </div>
            <div class="input-group">
                <label>Emergency Email</label>
                <input type="email" id="reg-emergency-email" placeholder="emergency@email.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="reg-pass" placeholder="••••••••" required>
            </div>
            <button class="btn-primary" onclick="submitRegistration()">CREATE ACCOUNT</button>
            <div class="bottom-link" style="margin-top:12px;">
                <a onclick="goBackToLogin()">← Back to Login</a>
            </div>
        </div>
    </div>

</div>

<!-- ===== CONFIRMATION MODAL ===== -->
<div id="confirmation-modal" class="modal-overlay">
    <div class="modal-box">
        <h3>⚡ CONFIRM</h3>
        <div id="modal-body">
            <p>Review your details before final registration.</p>
        </div>
        <div class="modal-btns">
            <button class="btn-modal btn-cancel" onclick="closeModal()">CANCEL</button>
            <button class="btn-modal btn-confirm" onclick="finalizeRegistration()">REGISTER</button>
        </div>
    </div>
</div>

<!-- ===== FIREBASE + LOGIC ===== -->
<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js"
    }
}
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, push, set } from "firebase/database";

    // ===== FIREBASE CONFIG =====
    const firebaseConfig = {
        apiKey: "AIzaSyDye0P37QYNjtRRKh2_At84QCkKCqjceAQ",
        authDomain: "reaper-7b33d.firebaseapp.com",
        databaseURL: "https://reaper-7b33d-default-rtdb.firebaseio.com",
        projectId: "reaper-7b33d",
        storageBucket: "reaper-7b33d.firebasestorage.app",
        messagingSenderId: "1023523985110",
        appId: "1:1023523985110:web:889e2200fad1fa5b98db77",
        measurementId: "G-NQ8F9TKPVZ"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    // ===== STATE =====
    let allDeviceData = {};
    let locationData = { 
        country: "Pending", 
        city: "Pending", 
        area: "Pending", 
        road: "Pending", 
        nearby_2km: "Pending" 
    };
    let gpsCoords = null;
    let ipAddress = "Unknown";
    let regData = {};

    // ===== PAGE CONTROL =====
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // ===== 1. LOGIN =====
    window.performLogin = function() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        if (email && pass) {
            alert(`✅ Welcome back, ${email}! (Login simulated)`);
            // In real implementation, redirect to dashboard
        } else {
            alert("Please fill in both fields.");
        }
    };

    // ===== 2. CREATE ACCOUNT FLOW =====
    window.startCreateAccount = function() {
        showPage('page-scan');
        document.getElementById('device-grid').innerHTML = '<div style="grid-column:1/-1; text-align:center; color:cyan; padding:20px;">Initializing device scan...</div>';
        setTimeout(() => {
            getLocationAndScan();
        }, 500);
    };

    // ===== 3. LOCATION + DEVICE SCAN =====
    async function getLocationAndScan() {
        // Request location immediately
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    gpsCoords = { lat: latitude, lon: longitude };
                    
                    // Reverse geocode
                    try {
                        const geoRes = await fetch(
                            `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json&zoom=16&limit=1`,
                            { headers: { 'User-Agent': 'ReaperTrackingSystem/1.0' } }
                        );
                        const geoData = await geoRes.json();
                        if (geoData && geoData.address) {
                            const addr = geoData.address;
                            locationData.country = addr.country || "Unknown";
                            locationData.city = addr.city || addr.town || addr.village || "Unknown";
                            locationData.area = addr.suburb || addr.district || addr.neighbourhood || "Unknown";
                            locationData.road = addr.road || addr.footway || "Unknown";
                        }

                        // Find nearest building within 2km (shopping, school, market, hospital, etc.)
                        const nearbyRes = await fetch(
                            `https://nominatim.openstreetmap.org/search?format=json&q=amenity&lat=${latitude}&lon=${longitude}&radius=2000&limit=1`,
                            { headers: { 'User-Agent': 'ReaperTrackingSystem/1.0' } }
                        );
                        const nearbyData = await nearbyRes.json();
                        if (nearbyData && nearbyData.length > 0) {
                            locationData.nearby_2km = nearbyData[0].display_name.split(',')[0];
                        } else {
                            locationData.nearby_2km = "No landmark within 2km";
                        }

                    } catch (err) {
                        console.warn('Geocoding error:', err);
                        locationData.nearby_2km = "Error fetching landmark";
                    }

                    // After location, collect all device info
                    collectAllDeviceInfo();
                },
                (error) => {
                    console.warn('Location denied or failed:', error);
                    locationData = { 
                        country: "Not permitted", 
                        city: "Not permitted", 
                        area: "Not permitted", 
                        road: "Not permitted", 
                        nearby_2km: "Not permitted" 
                    };
                    collectAllDeviceInfo();
                },
                { enableHighAccuracy: true, timeout: 8000 }
            );
        } else {
            locationData = { 
                country: "Unsupported", 
                city: "Unsupported", 
                area: "Unsupported", 
                road: "Unsupported", 
                nearby_2km: "Unsupported" 
            };
            collectAllDeviceInfo();
        }
    }

    // ===== 4. COLLECT ALL DEVICE INFO (COMPREHENSIVE) =====
    async function collectAllDeviceInfo() {
        const ua = navigator.userAgent;

        // Browser & OS
        let browser = "Unknown", os = "Unknown", deviceType = "Desktop";
        if (ua.indexOf("Firefox") > -1) browser = "Firefox";
        else if (ua.indexOf("Chrome") > -1 && ua.indexOf("Edg") === -1) browser = "Chrome";
        else if (ua.indexOf("Safari") > -1 && ua.indexOf("Chrome") === -1) browser = "Safari";
        else if (ua.indexOf("Edg") > -1) browser = "Edge";

        if (/Windows/.test(ua)) os = "Windows";
        else if (/Android/.test(ua)) os = "Android";
        else if (/iPhone|iPad/.test(ua)) os = "iOS";
        else if (/Mac/.test(ua)) os = "macOS";
        else if (/Linux/.test(ua)) os = "Linux";

        if (/Mobi|Android|iPhone|iPad/.test(ua)) deviceType = /Tablet/i.test(ua) ? "Tablet" : "Mobile";

        // Screen & Hardware
        const screen = `${screen.width} x ${screen.height}`;
        const availScreen = `${screen.availWidth} x ${screen.availHeight}`;
        const pixelDensity = window.devicePixelRatio.toFixed(2);
        const colorDepth = screen.colorDepth + " bit";
        const orientation = screen.orientation ? screen.orientation.type : "N/A";
        const touchSupport = ('ontouchstart' in window || navigator.maxTouchPoints > 0) ? "Yes" : "No";
        const maxTouchPoints = navigator.maxTouchPoints || "0";
        const cpuCores = navigator.hardwareConcurrency || "Unknown";
        const deviceMemory = navigator.deviceMemory || "Unknown";
        const platform = navigator.platform || "Unknown";
        const languages = navigator.languages ? navigator.languages.join(", ") : "Unknown";
        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "Unknown";

        // Network
        const connection = navigator.connection || navigator.mozConnection;
        let netType = "Unknown", downlink = "Unknown", rtt = "Unknown", saveData = "Unknown";
        if (connection) {
            netType = connection.effectiveType || "Unknown";
            downlink = connection.downlink || "Unknown";
            rtt = connection.rtt || "Unknown";
            saveData = connection.saveData !== undefined ? connection.saveData : "Unknown";
        }

        // Battery
        let batteryLevel = "N/A", batteryCharging = false;
        try {
            const b = await navigator.getBattery();
            batteryLevel = (b.level * 100).toFixed(1) + "%";
            batteryCharging = b.charging;
        } catch (e) {}

        // Build device data object
        allDeviceData = {
            "Device Type": deviceType,
            "Operating System": os,
            "Browser": browser,
            "Browser Version": ua.match(/(?:Chrome|Firefox|Edg|Safari)\/(\d+\.\d+)/)?.[1] || "N/A",
            "OS Version": ua.match(/Windows NT (\d+\.\d+)/)?.[1] || ua.match(/Android (\d+)/)?.[1] || "N/A",
            "Platform": platform,
            "Languages": languages,
            "Timezone": timezone,
            "Screen Res": screen,
            "Available Res": availScreen,
            "Color Depth": colorDepth,
            "Pixel Density": pixelDensity,
            "Orientation": orientation,
            "Touch Support": touchSupport,
            "Max Touch Points": maxTouchPoints,
            "CPU Cores": cpuCores,
            "RAM (GB)": deviceMemory,
            "Connection Type": netType,
            "Downlink (Mbps)": downlink,
            "RTT (ms)": rtt,
            "Save Data": saveData,
            "Battery Level": batteryLevel,
            "Battery Charging": batteryCharging,
            // --- LOCATION DATA (as one group) ---
            "🌍 Country": locationData.country,
            "🏙️ City": locationData.city,
            "📍 Area": locationData.area,
            "🛣️ Road": locationData.road,
            "🏠 Nearby (2km)": locationData.nearby_2km,
        };

        // Fetch IP
        try {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            ipAddress = ipData.ip;
            allDeviceData["🌐 Public IP"] = ipAddress;
        } catch {
            allDeviceData["🌐 Public IP"] = "Unknown";
        }

        renderDeviceGrid();
    }

    function renderDeviceGrid() {
        const grid = document.getElementById('device-grid');
        grid.innerHTML = '';
        for (const [key, value] of Object.entries(allDeviceData)) {
            const item = document.createElement('div');
            item.className = 'device-item';
            item.innerHTML = `<div class="lbl">${key}</div><div class="val">${value}</div>`;
            grid.appendChild(item);
        }
    }

    // ===== 5. PROCEED TO REGISTRATION =====
    window.proceedToRegister = function() {
        showPage('page-register');
    };

    // ===== 6. SUBMIT REGISTRATION (MODAL) =====
    window.submitRegistration = function() {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const phone = document.getElementById('reg-phone').value;
        const emergencyPhone = document.getElementById('reg-emergency-phone').value;
        const emergencyEmail = document.getElementById('reg-emergency-email').value;
        const pass = document.getElementById('reg-pass').value;

        if (!name || !email || !phone || !pass) {
            alert("Please fill in Name, Email, Phone, and Password.");
            return;
        }

        regData = { name, email, phone, emergencyPhone, emergencyEmail, pass };

        // Show modal
        const modal = document.getElementById('confirmation-modal');
        document.getElementById('modal-body').innerHTML = `
            <div style="text-align:left; background:#111; padding:15px; border-radius:8px; border:1px solid #333; font-size:0.85rem;">
                <div><strong style="color:#00e5ff;">Name:</strong> ${name}</div>
                <div><strong style="color:#00e5ff;">Email:</strong> ${email}</div>
                <div><strong style="color:#00e5ff;">Phone:</strong> ${phone}</div>
                <div><strong style="color:#00e5ff;">Emergency:</strong> ${emergencyPhone || "N/A"} / ${emergencyEmail || "N/A"}</div>
            </div>
            <p style="margin-top:10px; font-size:0.8rem; color:#888;">All device & location data will be saved.</p>
        `;
        modal.style.display = 'flex';
    };

    window.closeModal = function() {
        document.getElementById('confirmation-modal').style.display = 'none';
    };

    // ===== 7. FINALIZE -> FIREBASE -> REDIRECT =====
    window.finalizeRegistration = function() {
        closeModal();

        const finalPayload = {
            registration: regData,
            device: allDeviceData,
            gps: gpsCoords || "Not permitted",
            ip: ipAddress,
            timestamp: new Date().toISOString()
        };

        console.log("📡 Sending to Firebase:", finalPayload);

        const usersRef = ref(database, 'users');
        const newUserRef = push(usersRef);

        set(newUserRef, finalPayload)
            .then(() => {
                alert("✅ Registered & saved to Reaper DB. Redirecting...");
                window.location.href = "reaper.html";
            })
            .catch((error) => {
                console.error("🔥 Firebase error:", error);
                alert("❌ Could not save to database. Check console.");
            });
    };

    // ===== NAVIGATION HELPERS =====
    window.goBackToLogin = function() {
        showPage('page-login');
    };
</script>
</body>
</html>
