<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Reaper - Login</title>
<!-- Importing a cool tech font -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
    /* --- RESET & BASIC STYLING --- */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
    body {
        background: #0a0a0a;
        color: #fff;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
    }
    /* Cool background grid effect */
    body::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: 
            linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        z-index: -1;
    }

    /* --- UTILITY CLASSES --- */
    .hidden { display: none !important; }
    .container {
        background: rgba(15, 15, 18, 0.9);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(0, 229, 255, 0.15);
        border-radius: 20px;
        width: 480px;
        max-width: 95%;
        padding: 40px;
        box-shadow: 0 0 60px rgba(0, 229, 255, 0.2), inset 0 0 60px rgba(0, 229, 255, 0.02);
        position: relative;
        overflow: hidden;
    }
    /* Subtle glow effect on container */
    .container::after {
        content: '';
        position: absolute;
        top: -50%; left: -50%; width: 200%; height: 200%;
        background: radial-gradient(circle, rgba(0, 229, 255, 0.05) 0%, transparent 70%);
        z-index: -1;
        pointer-events: none;
    }

    /* --- LOGO --- */
    .logo-container { text-align: center; margin-bottom: 25px; }
    .logo-container img {
        height: 100px;
        filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.3));
        transition: transform 0.3s ease;
    }
    .logo-container img:hover { transform: scale(1.05); }

    /* --- TYPOGRAPHY --- */
    h1, h2 { font-family: 'Orbitron', sans-serif; text-align: center; letter-spacing: 2px; }
    h1 { font-size: 1.8rem; background: linear-gradient(90deg, #00e5ff, #0077ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
    h2 { font-size: 1rem; color: #555; -webkit-text-fill-color: #777; letter-spacing: 4px; font-weight: 400; margin-bottom: 25px; }

    /* --- FORMS & INPUTS --- */
    .input-group { margin-bottom: 20px; position: relative; }
    .input-group label { display: block; color: #aaa; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .input-group input {
        width: 100%;
        padding: 14px 15px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 8px;
        color: #fff;
        font-size: 1rem;
        outline: none;
        transition: all 0.3s ease;
    }
    .input-group input:focus { border-color: #00e5ff; box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); background: rgba(255,255,255,0.08); }
    .input-group input::placeholder { color: #555; }

    /* --- BUTTONS (SICK TECH) --- */
    .btn-primary {
        width: 100%;
        padding: 15px;
        background: transparent;
        border: 1px solid #00e5ff;
        color: #00e5ff;
        font-weight: 700;
        font-size: 1rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }
    .btn-primary:hover {
        background: #00e5ff;
        color: #0a0a0a;
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
    }
    .btn-primary:active { transform: scale(0.98); }
    /* Used for "Confirm" actions */
    .btn-secondary {
        background: rgba(0, 229, 255, 0.2);
        border: 1px solid rgba(0, 229, 255, 0.4);
    }

    /* --- CREATE ACCOUNT LINK --- */
    .bottom-links { text-align: center; margin-top: 20px; }
    .bottom-links a { color: #00e5ff; text-decoration: none; font-weight: 600; transition: 0.3s; cursor: pointer; }
    .bottom-links a:hover { text-shadow: 0 0 10px #00e5ff; }

    /* --- DEVICE INFO GRID --- */
    .device-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin: 15px 0;
        max-height: 350px;
        overflow-y: auto;
        padding-right: 5px;
    }
    .device-grid::-webkit-scrollbar { width: 6px; }
    .device-grid::-webkit-scrollbar-track { background: #111; border-radius: 5px; }
    .device-grid::-webkit-scrollbar-thumb { background: #00e5ff; border-radius: 5px; }

    .device-card {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.05);
        padding: 12px;
        border-radius: 8px;
        font-size: 0.85rem;
    }
    .device-card .label { color: #00e5ff; font-weight: 600; display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
    .device-card .value { color: #ddd; word-break: break-all; }
    .device-card.full-width { grid-column: 1 / -1; }

    /* --- SCANNING LOADER --- */
    .scanner-line {
        width: 100%; height: 2px;
        background: linear-gradient(90deg, transparent, #00e5ff, transparent);
        position: relative;
        animation: scan 2s infinite linear;
        margin-bottom: 15px;
        opacity: 0.8;
    }
    @keyframes scan { 0% { top: 0; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }

    /* --- MODAL / CONFIRMATION OVERLAY --- */
    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85);
        backdrop-filter: blur(5px);
        display: flex; align-items: center; justify-content: center;
        z-index: 999;
    }
    .modal-box {
        background: #111;
        border: 1px solid #00e5ff;
        padding: 30px;
        max-width: 90%;
        width: 400px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 0 40px rgba(0, 229, 255, 0.2);
    }
    .modal-box p { margin: 15px 0; color: #ccc; }
    .modal-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
    .btn-small { padding: 8px 20px; border-radius: 5px; font-size: 0.9rem; cursor: pointer; border: none; font-weight: bold; text-transform: uppercase; }
    .btn-confirm { background: #00e5ff; color: #000; }
    .btn-cancel { background: #333; color: #aaa; }

    /* --- FLOW TITLE --- */
    .step-title { color: #00e5ff; text-transform: uppercase; letter-spacing: 3px; font-size: 0.9rem; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
</style>
</head>
<body>

<div class="container" id="app-container">
    
    <!-- ======================= SCREEN 1: LOGIN ======================= -->
    <div id="login-screen">
        <div class="logo-container">
            <!-- REPLACE THIS WITH YOUR reaper.png -->
            <img src="reaper.png" alt="The Reaper Logo">
        </div>
        <h1>THE REAPER</h1>
        <h2>Tech Tracking System</h2>

        <form id="login-form" onsubmit="event.preventDefault(); handleLogin();">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="reaper@cybertech.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-pass" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">SECURE LOGIN</button>
        </form>

        <div class="bottom-links">
            <a id="create-account-btn" onclick="startRegistrationFlow()">CREATE ACCOUNT</a>
        </div>
    </div>

    <!-- ======================= SCREEN 2: DEVICE SCAN ======================= -->
    <div id="device-scan-screen" class="hidden">
        <div class="logo-container" style="margin-bottom: 15px;">
            <img src="reaper.png" style="height: 60px;">
        </div>
        <h2 style="color:#00e5ff; -webkit-text-fill-color: white; font-weight: bold;">DEVICE SCAN</h2>
        <div class="scanner-line"></div>
        <p style="text-align:center; color:#aaa; font-size:0.9rem;">Extracting Technical Fingerprint...</p>
        
        <div id="device-data-container">
            <div class="device-grid" id="device-grid"></div>
        </div>

        <div style="margin-top: 20px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="input-group" style="margin:0;">
                <label>GPS Permission</label>
                <button onclick="requestGPS()" class="btn-primary" style="padding:8px; font-size:0.8rem; width:100%;">ALLOW LOCATION</button>
            </div>
            <div class="input-group" style="margin:0;">
                <label>IP Address</label>
                <div id="ip-display" style="background:rgba(255,255,255,0.05); padding:8px; border-radius:5px; text-align:center; color:#aaa; font-size:0.9rem;">Fetching...</div>
            </div>
        </div>

        <button onclick="proceedToRegister()" class="btn-primary" style="margin-top: 20px;">PROCEED TO REGISTER DEVICE</button>
    </div>

    <!-- ======================= SCREEN 3: REGISTRATION ======================= -->
    <div id="register-screen" class="hidden">
        <div class="logo-container" style="margin-bottom: 15px;">
            <img src="reaper.png" style="height: 60px;">
        </div>
        <h2 style="color:#00e5ff; -webkit-text-fill-color: white; font-weight: bold;">REGISTRATION</h2>
        <p style="text-align:center; color:#aaa; font-size:0.85rem; margin-bottom: 20px;">Secure your device with The Reaper</p>

        <form id="register-form" onsubmit="event.preventDefault(); submitRegistration();">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="John Doe" required>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="john@email.com" required>
            </div>
            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" id="reg-phone" placeholder="+1 555 000 000" required>
            </div>
            <div class="input-group">
                <label>Emergency Number</label>
                <input type="tel" id="reg-emergency-phone" placeholder="Emergency Contact">
            </div>
            <div class="input-group">
                <label>Emergency Email</label>
                <input type="email" id="reg-emergency-email" placeholder="emergency@email.com">
            </div>
            <div class="input-group">
                <label>Create Password</label>
                <input type="password" id="reg-pass" placeholder="Create a strong password" required>
            </div>
            <button type="submit" class="btn-primary">CREATE ACCOUNT</button>
        </form>
    </div>
</div>

<!-- MODAL Overlay for Confirmation -->
<div id="confirmation-modal" class="modal-overlay hidden">
    <div class="modal-box">
        <h2 style="color:#00e5ff; font-family:'Orbitron';">CONFIRM</h2>
        <div id="modal-content">
            <p>Verify your details below.</p>
        </div>
        <div class="modal-buttons">
            <button class="btn-small btn-cancel" onclick="closeModal()">CANCEL</button>
            <button class="btn-small btn-confirm" onclick="finalizeRegistration()">CONFIRM & CREATE</button>
        </div>
    </div>
</div>

<script>
    // --- GLOBAL VARIABLES ---
    let collectedDeviceData = {};
    let registrationData = {};

    // --- SCREEN FUNCTIONS ---
    function showScreen(id) {
        document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // --- 1. LOGIN TRIGGER ---
    function handleLogin() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        if(email && pass) {
            alert(`Welcome back, ${email}! (Simulated Login Successful)`);
        } else {
            alert("Please fill in all fields.");
        }
    }

    // --- 2. CREATE ACCOUNT (START SCAN) ---
    function startRegistrationFlow() {
        showScreen('device-scan-screen');
        document.getElementById('device-grid').innerHTML = '<div style="grid-column:1/-1; text-align:center;color:cyan;">Initializing deep system scan...</div>';
        setTimeout(() => {
            collectDeviceInfo();
        }, 800);
    }

    // --- 3. AUTO COLLECT DEVICE DATA ---
    function collectDeviceInfo() {
        // Basic Info
        const ua = navigator.userAgent;
        let browserName = "Unknown";
        if (ua.indexOf("Firefox") > -1) browserName = "Firefox";
        else if (ua.indexOf("Chrome") > -1 && ua.indexOf("Edg") === -1) browserName = "Chrome";
        else if (ua.indexOf("Safari") > -1 && ua.indexOf("Chrome") === -1) browserName = "Safari";
        else if (ua.indexOf("Edg") > -1) browserName = "Edge";
        
        let os = "Unknown";
        if (ua.indexOf("Windows") > -1) os = "Windows";
        else if (ua.indexOf("Android") > -1) os = "Android";
        else if (ua.indexOf("iPhone") > -1 || ua.indexOf("iPad") > -1) os = "iOS";
        else if (ua.indexOf("Mac") > -1) os = "macOS";
        else if (ua.indexOf("Linux") > -1) os = "Linux";

        let deviceType = "Desktop";
        if (/Mobi|Android|iPhone|iPad|iPod/i.test(ua)) deviceType = /Tablet/i.test(ua) ? "Tablet" : "Mobile";

        const screenInfo = `${screen.width} x ${screen.height}`;
        const pixelDensity = window.devicePixelRatio;
        const orientation = screen.orientation ? screen.orientation.type : "N/A";
        const touchSupport = 'ontouchstart' in window || navigator.maxTouchPoints > 0 ? "Yes" : "No";
        const cpuCores = navigator.hardwareConcurrency || "Unknown";
        const lang = navigator.language || "Unknown";
        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "Unknown";

        // Build Data Object
        collectedDeviceData = {
            "Device Type": deviceType,
            "Operating System": os,
            "Browser": browserName,
            "OS Version": ua.match(/Windows NT (\d+\.\d+)/)?.[1] || ua.match(/Android (\d+)/)?.[1] || "N/A",
            "Browser Version": ua.match(/(?:Chrome|Firefox|Edg|Safari)\/(\d+\.\d+)/)?.[1] || "N/A",
            "Screen": screenInfo,
            "Pixel Density": pixelDensity.toFixed(2),
            "Orientation": orientation,
            "Touch Support": touchSupport,
            "CPU Cores": cpuCores,
            "Language": lang,
            "Timezone": timezone,
            "Connection Type": navigator.connection ? navigator.connection.effectiveType : "N/A"
        };

        renderDeviceInfo();
        getPublicIP();
    }

    function renderDeviceInfo() {
        const grid = document.getElementById('device-grid');
        grid.innerHTML = '';
        for (const [key, value] of Object.entries(collectedDeviceData)) {
            const card = document.createElement('div');
            card.className = 'device-card';
            card.innerHTML = `<span class="label">${key}</span><span class="value">${value}</span>`;
            grid.appendChild(card);
        }
    }

    // --- 4. GET PUBLIC IP ---
    async function getPublicIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            document.getElementById('ip-display').innerHTML = `<span style="color:#00e5ff;">${data.ip}</span>`;
        } catch (error) {
            document.getElementById('ip-display').innerHTML = "Unable to fetch (Check Internet)";
        }
    }

    // --- 5. REQUEST GPS PERMISSION ---
    function requestGPS() {
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition((position) => {
                alert(`GPS Locked: Lat ${position.coords.latitude.toFixed(4)}, Long ${position.coords.longitude.toFixed(4)}`);
                document.querySelector('#device-scan-screen .scanner-line').style.animation = "scan 1s infinite";
            }, (error) => {
                alert("GPS Permission Denied.");
            });
        } else {
            alert("Geolocation not supported by this browser.");
        }
    }

    // --- 6. PROCEED TO REGISTER ---
    let proceedFlag = false;

    function proceedToRegister() {
        if(!proceedFlag) {
            document.querySelector('#device-scan-screen .scanner-line').style.animation = "scan 0.5s infinite linear";
            document.getElementById('device-scan-screen').querySelector('p').innerHTML = "<span style='color:#00e5ff;'>DEVICE LOCKED AND SCANNED</span>";
            setTimeout(() => {
                showScreen('register-screen');
            }, 1200);
            proceedFlag = true;
        } else {
            showScreen('register-screen');
        }
    }

    // --- 7. FINAL REGISTRATION PROCESS ---
    function submitRegistration() {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const phone = document.getElementById('reg-phone').value;
        const emergencyPhone = document.getElementById('reg-emergency-phone').value;
        const emergencyEmail = document.getElementById('reg-emergency-email').value;
        const pass = document.getElementById('reg-pass').value;

        if (!name || !email || !phone || !pass) {
            alert("Please fill in Name, Email, Phone, and Password.");
            return;
        }

        registrationData = { name, email, phone, emergencyPhone, emergencyEmail, pass };
        
        // Show Confirmation Modal
        const modal = document.getElementById('confirmation-modal');
        const content = document.getElementById('modal-content');
        content.innerHTML = `
            <p>Please review and confirm your information:</p>
            <div style="text-align:left; background:#111; padding:15px; border-radius:8px; border:1px solid #333; font-size:0.9rem;">
                <strong style="color:#00e5ff;">Name:</strong> ${name}<br>
                <strong style="color:#00e5ff;">Email:</strong> ${email}<br>
                <strong style="color:#00e5ff;">Phone:</strong> ${phone}<br>
                <strong style="color:#00e5ff;">Emergency:</strong> ${emergencyPhone || "N/A"} / ${emergencyEmail || "N/A"}
            </div>
            <p style="margin-top:10px; font-size:0.8rem; color:#ccc;">A verification code will be sent to your phone and emergency contacts.</p>
        `;
        modal.classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('confirmation-modal').classList.add('hidden');
    }

    function finalizeRegistration() {
        closeModal();
        alert("Registration Successful! Device tracking system initialized.");
        // Reset view to Login
        location.reload(); // Simple reload for demo
    }

    // Handle Enter key on login
    document.getElementById('login-pass').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { handleLogin(); }
    });
</script>

</body>
</html>
