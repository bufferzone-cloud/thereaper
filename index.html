<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Reaper - Tech Tracking</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
    /* --- RESET --- */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
    body {
        background: #000000;
        color: #fff;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
    }

    /* --- MAIN WRAPPER --- */
    .page-container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: all 0.5s ease;
        padding: 20px;
    }

    /* --- PAGES --- */
    .page {
        display: none;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 600px;
        text-align: center;
        animation: fadeIn 0.6s ease;
    }
    .page.active { display: flex; }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }

    /* --- MASSIVE LOGO + BLENDING --- */
    .logo-mega {
        width: 70%;
        max-width: 350px;
        margin: 0 auto;
        /* BLENDING MAGIC: */
        mix-blend-mode: screen;
        filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.2));
        display: block;
        transition: 0.3s ease;
    }
    .logo-mega:hover { transform: scale(1.05); }

    /* --- TYPOGRAPHY --- */
    .reaper-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 3rem;
        background: linear-gradient(90deg, #00e5ff, #0077ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 4px;
        margin-top: 10px;
    }
    .reaper-sub {
        color: #666;
        letter-spacing: 6px;
        text-transform: uppercase;
        font-size: 0.9rem;
        margin-bottom: 20px;
    }

    /* --- ELEMENTS --- */
    .card {
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(0, 229, 255, 0.15);
        border-radius: 16px;
        padding: 30px;
        width: 100%;
        box-shadow: 0 0 40px rgba(0, 229, 255, 0.1);
    }

    .btn-primary {
        width: 100%;
        padding: 15px;
        background: transparent;
        border: 1px solid #00e5ff;
        color: #00e5ff;
        font-weight: 700;
        font-size: 1rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
    }
    .btn-primary:hover {
        background: #00e5ff;
        color: #000;
        box-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
    }

    .input-group {
        margin-bottom: 15px;
        text-align: left;
    }
    .input-group label {
        color: #aaa;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        display: block;
        margin-bottom: 5px;
    }
    .input-group input {
        width: 100%;
        padding: 12px 15px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 8px;
        color: #fff;
        font-size: 1rem;
        outline: none;
        transition: 0.3s;
    }
    .input-group input:focus {
        border-color: #00e5ff;
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
    }

    /* --- DEVICE GRID --- */
    .device-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        max-height: 300px;
        overflow-y: auto;
        padding: 5px;
        margin: 10px 0;
    }
    .device-grid::-webkit-scrollbar { width: 6px; }
    .device-grid::-webkit-scrollbar-track { background: #111; }
    .device-grid::-webkit-scrollbar-thumb { background: #00e5ff; border-radius: 4px; }

    .device-item {
        background: rgba(255,255,255,0.03);
        padding: 10px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.05);
    }
    .device-item .lbl { color: #00e5ff; font-size: 0.65rem; text-transform: uppercase; }
    .device-item .val { color: #ddd; font-size: 0.9rem; }

    /* --- LOCATION DISPLAY --- */
    .location-box {
        background: rgba(0, 229, 255, 0.05);
        border-left: 3px solid #00e5ff;
        padding: 15px;
        border-radius: 8px;
        margin: 15px 0;
        text-align: left;
    }
    .location-box div { display: flex; gap: 8px; font-size: 0.9rem; }
    .location-box .tag { color: #00e5ff; font-weight: 600; min-width: 70px; }

    /* --- SCAN LINE --- */
    .scanner-bar {
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, transparent, #00e5ff, transparent);
        animation: scan 2s infinite linear;
        margin: 10px 0 20px 0;
    }
    @keyframes scan { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

    /* --- MODAL --- */
    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9);
        backdrop-filter: blur(4px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 999;
    }
    .modal-box {
        background: #0a0a0a;
        border: 1px solid #00e5ff;
        padding: 30px;
        border-radius: 16px;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 0 60px rgba(0,229,255,0.1);
    }
    .modal-box h3 { font-family: 'Orbitron'; color: #00e5ff; margin-bottom: 15px; }
    .modal-box p { color: #ccc; margin-bottom: 15px; }
    .modal-btns { display: flex; gap: 10px; }
    .btn-modal { flex:1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .btn-confirm { background: #00e5ff; color: #000; }
    .btn-cancel { background: #333; color: #aaa; }

    .hidden { display: none !important; }
</style>
</head>
<body>

<div class="page-container">

    <!-- ===== PAGE 1: LANDING + LOCATION ===== -->
    <div id="page-landing" class="page active">
        <img src="reaper.png" alt="The Reaper" class="logo-mega">
        <div class="reaper-title">THE REAPER</div>
        <div class="reaper-sub">Tech Tracking System</div>

        <div class="card" style="max-width: 450px;">
            <p style="color:#aaa; margin-bottom:15px;">Allow <strong style="color:#00e5ff;">Location</strong> to begin device mapping.</p>
            <button class="btn-primary" id="request-location-btn" onclick="getLocationAndProceed()">ACTIVATE LOCATION</button>
            <div id="location-status" style="margin-top:12px; color:#aaa; font-size:0.9rem;"></div>
        </div>
    </div>

    <!-- ===== PAGE 2: DEVICE SCAN ===== -->
    <div id="page-scan" class="page">
        <h2 style="font-family:'Orbitron'; letter-spacing:3px; color:#00e5ff;">DEVICE SCAN</h2>
        <div class="scanner-bar"></div>
        <div id="location-display" class="location-box hidden"></div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; color:#aaa; font-size:0.8rem;">
                <span>Acquiring Hardware Fingerprint</span>
                <span style="color:#00e5ff;">Live</span>
            </div>
            <div class="device-grid" id="device-grid">
                <div style="grid-column:1/-1; text-align:center; color:cyan; padding:20px;">Scanning system...</div>
            </div>
            <button class="btn-primary" onclick="proceedToRegister()">PROCEED TO REGISTER</button>
        </div>
    </div>

    <!-- ===== PAGE 3: REGISTRATION ===== -->
    <div id="page-register" class="page">
        <h2 style="font-family:'Orbitron'; letter-spacing:3px; color:#00e5ff;">REGISTRATION</h2>
        <div class="card" style="max-width:500px;">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="John Doe" required>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="john@email.com" required>
            </div>
            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" id="reg-phone" placeholder="+1 555 000 000" required>
            </div>
            <div class="input-group">
                <label>Emergency Number</label>
                <input type="tel" id="reg-emergency-phone" placeholder="Emergency Contact">
            </div>
            <div class="input-group">
                <label>Emergency Email</label>
                <input type="email" id="reg-emergency-email" placeholder="emergency@email.com">
            </div>
            <div class="input-group">
                <label>Create Password</label>
                <input type="password" id="reg-pass" placeholder="••••••••" required>
            </div>
            <button class="btn-primary" onclick="submitRegistration()">CREATE ACCOUNT</button>
        </div>
    </div>

</div>

<!-- ===== MODAL ===== -->
<div id="confirmation-modal" class="modal-overlay">
    <div class="modal-box">
        <h3>CONFIRM IDENTITY</h3>
        <div id="modal-body">
            <p>Review your details below before registration.</p>
        </div>
        <div class="modal-btns">
            <button class="btn-modal btn-cancel" onclick="closeModal()">CANCEL</button>
            <button class="btn-modal btn-confirm" onclick="finalizeRegistration()">REGISTER</button>
        </div>
    </div>
</div>

<!-- ===== FIREBASE + LOGIC ===== -->
<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js"
    }
}
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, push, set } from "firebase/database";

    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyDye0P37QYNjtRRKh2_At84QCkKCqjceAQ",
        authDomain: "reaper-7b33d.firebaseapp.com",
        databaseURL: "https://reaper-7b33d-default-rtdb.firebaseio.com",
        projectId: "reaper-7b33d",
        storageBucket: "reaper-7b33d.firebasestorage.app",
        messagingSenderId: "1023523985110",
        appId: "1:1023523985110:web:889e2200fad1fa5b98db77",
        measurementId: "G-NQ8F9TKPVZ"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    // --- VARIABLES ---
    let deviceData = {};
    let locationData = { country: "Unknown", city: "Unknown", area: "Unknown", road: "Unknown", nearby: "Unknown" };
    let gpsCoords = null;
    let regData = {};
    let ipAddress = "Unknown";

    // --- PAGE NAVIGATION ---
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- 1. LOCATION REQUEST (IMMEDIATE) ---
    window.getLocationAndProceed = function() {
        const statusEl = document.getElementById('location-status');
        statusEl.innerHTML = '⏳ Requesting GPS access...';

        if (!navigator.geolocation) {
            statusEl.innerHTML = '⚠️ Geolocation not supported.';
            collectedLocationFailed();
            return;
        }

        navigator.geolocation.getCurrentPosition(
            async (pos) => {
                const { latitude, longitude } = pos.coords;
                gpsCoords = { lat: latitude, lon: longitude };
                statusEl.innerHTML = '✅ GPS acquired. Reverse geocoding...';
                
                // fetch address details
                try {
                    const response = await fetch(
                        `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json&zoom=16&limit=1`,
                        {
                            headers: { 'User-Agent': 'ReaperTrackingSystem/1.0' }
                        }
                    );
                    const data = await response.json();
                    
                    if (data && data.address) {
                        const addr = data.address;
                        locationData.country = addr.country || "Unknown";
                        locationData.city = addr.city || addr.town || addr.village || "Unknown";
                        locationData.area = addr.suburb || addr.district || addr.neighbourhood || "Unknown";
                        locationData.road = addr.road || addr.footway || "Unknown";
                        
                        // nearby places: try to fetch one landmark (shopping/school/market/etc.)
                        const nearbyRes = await fetch(
                            `https://nominatim.openstreetmap.org/search?format=json&q=shopping|school|market|hospital&lat=${latitude}&lon=${longitude}&radius=1000&limit=1`,
                            { headers: { 'User-Agent': 'ReaperTrackingSystem/1.0' } }
                        );
                        const nearbyData = await nearbyRes.json();
                        if (nearbyData && nearbyData.length > 0) {
                            locationData.nearby = nearbyData[0].display_name.split(',')[0];
                        } else {
                            locationData.nearby = "No landmark found nearby";
                        }
                    }
                } catch (err) {
                    console.warn('Reverse geocoding error:', err);
                    locationData.country = "Error obtaining";
                }

                // Display location on next page
                displayLocationInfo();
                
                // Move to device scan
                showPage('page-scan');
                collectAllDeviceInfo();
            },
            (error) => {
                let msg = '⚠️ Location denied.';
                if (error.code === 1) msg += ' Please refresh and allow access.';
                else if (error.code === 2) msg += ' Position unavailable.';
                else if (error.code === 3) msg += ' Request timed out.';
                statusEl.innerHTML = msg;
                collectedLocationFailed();
                showPage('page-scan');
                collectAllDeviceInfo();
            },
            { enableHighAccuracy: true, timeout: 8000 }
        );
    };

    function collectedLocationFailed() {
        locationData = { country: "Not permitted", city: "Not permitted", area: "Not permitted", road: "Not permitted", nearby: "Not permitted" };
        displayLocationInfo();
    }

    function displayLocationInfo() {
        const container = document.getElementById('location-display');
        container.classList.remove('hidden');
        container.innerHTML = `
            <div><span class="tag">Country:</span> ${locationData.country}</div>
            <div><span class="tag">City:</span> ${locationData.city}</div>
            <div><span class="tag">Area:</span> ${locationData.area}</div>
            <div><span class="tag">Road:</span> ${locationData.road}</div>
            <div><span class="tag">Near:</span> ${locationData.nearby}</div>
        `;
    }

    // --- 2. COLLECT ALL DEVICE INFO (ADVANCED) ---
    async function collectAllDeviceInfo() {
        const ua = navigator.userAgent;
        let browser = "Unknown", os = "Unknown", deviceType = "Desktop";
        if (ua.indexOf("Firefox") > -1) browser = "Firefox";
        else if (ua.indexOf("Chrome") > -1 && ua.indexOf("Edg") === -1) browser = "Chrome";
        else if (ua.indexOf("Safari") > -1 && ua.indexOf("Chrome") === -1) browser = "Safari";
        else if (ua.indexOf("Edg") > -1) browser = "Edge";

        if (/Windows/.test(ua)) os = "Windows";
        else if (/Android/.test(ua)) os = "Android";
        else if (/iPhone|iPad/.test(ua)) os = "iOS";
        else if (/Mac/.test(ua)) os = "macOS";
        else if (/Linux/.test(ua)) os = "Linux";

        if (/Mobi|Android|iPhone|iPad/.test(ua)) deviceType = /Tablet/i.test(ua) ? "Tablet" : "Mobile";

        const screen = `${screen.width} x ${screen.height}`;
        const pixelDensity = window.devicePixelRatio.toFixed(2);
        const colorDepth = screen.colorDepth + " bit";
        const orientation = screen.orientation ? screen.orientation.type : "N/A";
        const cpuCores = navigator.hardwareConcurrency || "Unknown";
        const deviceMemory = navigator.deviceMemory || "Unknown";
        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "Unknown";
        const languages = navigator.languages ? navigator.languages.join(", ") : "Unknown";

        const connection = navigator.connection || navigator.mozConnection;
        let netType = "Unknown", downlink = "Unknown", rtt = "Unknown";
        if (connection) {
            netType = connection.effectiveType;
            downlink = connection.downlink;
            rtt = connection.rtt;
        }

        let battery = { level: "N/A", charging: false };
        try {
            const b = await navigator.getBattery();
            battery.level = (b.level * 100).toFixed(1) + "%";
            battery.charging = b.charging;
        } catch (e) {}

        deviceData = {
            "Device Type": deviceType,
            "OS": os,
            "Browser": browser,
            "Browser Version": ua.match(/(?:Chrome|Firefox|Edg|Safari)\/(\d+\.\d+)/)?.[1] || "N/A",
            "OS Version": ua.match(/Windows NT (\d+\.\d+)/)?.[1] || ua.match(/Android (\d+)/)?.[1] || "N/A",
            "Screen": screen,
            "Pixel Density": pixelDensity,
            "Color Depth": colorDepth,
            "Orientation": orientation,
            "CPU Cores": cpuCores,
            "RAM (GB)": deviceMemory,
            "Language": languages,
            "Timezone": timezone,
            "Connection": netType,
            "Downlink (Mbps)": downlink,
            "RTT (ms)": rtt,
            "Battery Level": battery.level,
            "Battery Charging": battery.charging,
        };

        renderDeviceGrid();
        fetchPublicIP();
    }

    function renderDeviceGrid() {
        const grid = document.getElementById('device-grid');
        grid.innerHTML = '';
        for (const [key, value] of Object.entries(deviceData)) {
            const div = document.createElement('div');
            div.className = 'device-item';
            div.innerHTML = `<div class="lbl">${key}</div><div class="val">${value}</div>`;
            grid.appendChild(div);
        }
    }

    async function fetchPublicIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            ipAddress = data.ip;
        } catch { ipAddress = "Unknown"; }
    }

    // --- 3. PROCEED TO REGISTRATION ---
    window.proceedToRegister = function() {
        showPage('page-register');
    };

    // --- 4. SUBMIT REGISTRATION (MODAL) ---
    window.submitRegistration = function() {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const phone = document.getElementById('reg-phone').value;
        const emergencyPhone = document.getElementById('reg-emergency-phone').value;
        const emergencyEmail = document.getElementById('reg-emergency-email').value;
        const pass = document.getElementById('reg-pass').value;

        if (!name || !email || !phone || !pass) {
            alert("Please fill in all required fields.");
            return;
        }

        regData = { name, email, phone, emergencyPhone, emergencyEmail, pass };

        // Show Modal
        const modal = document.getElementById('confirmation-modal');
        document.getElementById('modal-body').innerHTML = `
            <div style="text-align:left; background:#111; padding:15px; border-radius:8px; border:1px solid #333;">
                <strong style="color:#00e5ff;">Name:</strong> ${name}<br>
                <strong style="color:#00e5ff;">Email:</strong> ${email}<br>
                <strong style="color:#00e5ff;">Phone:</strong> ${phone}<br>
                <strong style="color:#00e5ff;">Emergency:</strong> ${emergencyPhone || "N/A"} / ${emergencyEmail || "N/A"}
            </div>
        `;
        modal.style.display = 'flex';
    };

    window.closeModal = function() {
        document.getElementById('confirmation-modal').style.display = 'none';
    };

    // --- 5. FINALIZE -> FIREBASE -> REDIRECT ---
    window.finalizeRegistration = function() {
        closeModal();

        const finalPayload = {
            registration: regData,
            device: deviceData,
            location: locationData,
            ip: ipAddress,
            gps: gpsCoords || "Not permitted",
            timestamp: new Date().toISOString()
        };

        console.log("Saving to Firebase:", finalPayload);

        const usersRef = ref(database, 'users');
        const newUserRef = push(usersRef);
        
        set(newUserRef, finalPayload)
            .then(() => {
                alert("✅ Registered & Saved to Reaper DB. Redirecting...");
                window.location.href = "reaper.html";
            })
            .catch((err) => {
                console.error("Firebase error:", err);
                alert("❌ Could not save. Check console.");
            });
    };

</script>
</body>
</html>
